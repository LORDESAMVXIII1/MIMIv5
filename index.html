      state.actionSheetPostId = btn.getAttribute("data-open-sheet");
      render();
    });
  });
  appEl.querySelectorAll("[data-like]").forEach(function(btn) {

      var pid = btn.getAttribute("data-like");
      var post = posts.find(function(p){ return p.id === pid; });
      if (!post) return;
      var idx = post.likedBy.indexOf(ME_ID);
      if (idx === -1) {
        post.likedBy.push(ME_ID);

        if (post.authorId !== ME_ID) {
          addNotif("like", ME_ID, "curtiu sua publicação");
          FB.pushNotif(post.authorId, "like", "curtiu sua publicação");
          
          // Criar notificação no Firestore
          if (typeof FB !== "undefined" && FB.db) {
            var createdAt = new Date().toISOString();
            FB.db.collection("notifications").doc(post.authorId).collection("items").add({
              type: "like",
              fromUid: ME_ID,
              fromName: (USERS[ME_ID] || {}).name || "Usuário",
              fromAvatar: (USERS[ME_ID] || {}).avatar || "",
              text: "curtiu sua publicação",
              postId: pid,
              createdAt: createdAt,
              read: false
            }).catch(function(err){
              console.error("Erro ao criar notificação:", err);
            });
          }
        }
      } else {
        post.likedBy.splice(idx,1);
      }
      FB.likePost(pid, idx === -1);
      render();

  appEl.querySelectorAll("[data-save]").forEach(function(btn) {
    btn.addEventListener("click", function() {

        }).catch(function(err) {
          console.error("Falha ao copiar:", err);
          fallbackCopyToClipboard(shareUrl);
        });
      } else {
        fallbackCopyToClipboard(shareUrl);
      }
      
      if (typeof FB !== "undefined" && FB.incrementShareCount) {
        FB.incrementShareCount(postId).catch(function(){});
      }
    });
  });
  appEl.querySelectorAll("[data-toggle-comments]").forEach(function(btn) {
    btn.addEventListener("click", function() {

function bindCommentEvents() {
  appEl.querySelectorAll("[data-add-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() { addComment(btn.getAttribute("data-add-comment")); });
  });
  appEl.querySelectorAll("[data-comment-input]").forEach(function(input) {
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") addComment(input.getAttribute("data-comment-input"));
    });
  });
  appEl.querySelectorAll("[data-like-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var parts = btn.getAttribute("data-like-comment").split(":");
      var cmts = getComments(parts[0]);
      var c = cmts.find(function(x){ return x.id === parts[1]; });
      if (!c) return;
      var idx = c.likedBy.indexOf(ME_ID);
      if (idx === -1) c.likedBy.push(ME_ID); else c.likedBy.splice(idx,1);
      render();
    });
  });
  appEl.querySelectorAll("[data-reply-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var parts = btn.getAttribute("data-reply-comment").split(":");
      var cmts = getComments(parts[0]);
      var c = cmts.find(function(x){ return x.id === parts[1]; });
      if (!c) return;
      state.replyTarget = { pid:parts[0], commentId:c.id, authorName:USERS[c.authorId].name };
      render();
      var input = appEl.querySelector('[data-comment-input="'+parts[0]+'"]');
      if (input) input.focus();
    });
  });
  appEl.querySelectorAll("[data-cancel-reply]").forEach(function(btn) {
    btn.addEventListener("click", function() { state.replyTarget = null; render(); });
  });
  appEl.querySelectorAll("[data-report-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() { showToast("Comentário reportado. Vamos analisar. 🙏"); });
  });
}

function addComment(pid) {
  var input = appEl.querySelector('[data-comment-input="'+pid+'"]');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  var cmts = getComments(pid);
  var parentId = (state.replyTarget && state.replyTarget.pid === pid) ? state.replyTarget.commentId : null;
  var createdAt = new Date().toISOString();
  var newComment = {
    id: uid(),
    authorId: ME_ID,
    text: text,
    createdAt: createdAt,
    time: _relTime(createdAt),
    likedBy: [],
    parentId: parentId
  };
  cmts.push(newComment);
  
  // Sincronizar com Firebase
  if (typeof FB !== "undefined" && FB.addComment) {
    FB.addComment(pid, newComment).catch(function(err) {
      console.error("Erro ao comentar:", err);
      cmts.pop();
      showToast("Erro ao comentar 😞");
      render();
    });
  }

  // Notificação: comentário na publicação de outra pessoa
  var post = posts.find(function(p){ return p.id === pid; });
  if (post && post.authorId !== ME_ID) {
    var cmtText = 'comentou: "' + text.slice(0,40) + (text.length>40?"…":"") + '"';
    addNotif("comment", ME_ID, cmtText, post.authorId);
    FB.pushNotif(post.authorId, "comment", cmtText);
  }
  // Notificação: menção (@usuario)
  var mentions = text.match(/@(\w+)/g);
  if (mentions) {
    mentions.forEach(function(m) {
      var uname = m.toLowerCase();
      var mentioned = Object.values(USERS).find(function(u){ return (u.username||"").toLowerCase() === uname || (u.username||"").toLowerCase() === uname.slice(1); });
      if (mentioned && mentioned.uid !== ME_ID) {
        addNotif("mention", ME_ID, "te mencionou em um comentário", mentioned.uid);
        FB.pushNotif(mentioned.uid, "mention", "te mencionou em um comentário");
      }
    });
  }

  state.replyTarget = null;
  var box = appEl.querySelector('[data-comments-box="'+pid+'"]');
  var wasOpen = box && !box.classList.contains("hidden");
  render();
  if (wasOpen) {
    var newBox = appEl.querySelector('[data-comments-box="'+pid+'"]');
    if (newBox) newBox.classList.remove("hidden");
  }
}

function renderSearchResults(q) {
  var qLower = q.toLowerCase();
  // Inclui utilizadores locais (demo) E utilizadores reais já carregados
  var userResults = Object.values(USERS).filter(function(u) {
    if (!u || !u.name) return false;
    return (u.name||"").toLowerCase().indexOf(qLower) !== -1 ||
           (u.username||"").toLowerCase().indexOf(qLower) !== -1;
  });
  var postResults = posts.filter(function(p) {
    return (p.text||"").toLowerCase().indexOf(qLower) !== -1;
  });

  // Busca no Firestore em paralelo e re-renderiza quando chegar
  if (_idToken && q.length >= 2) {
    FB.searchUsers(q).then(function(found) {
      var changed = false;
      found.forEach(function(u) {
        if (!USERS[u._id || u.uid]) {
          var id = u._id || u.uid;
          delete u._id;
          u.uid = id;
          USERS[id] = u;
          changed = true;
        }
      });
      if (changed) render();
    });
  }

  if (!userResults.length && !postResults.length) {
    return '<div class="search-empty">Nenhum resultado para "'+esc(q)+'".<br>Tente buscar por nome, @usuário ou palavra-chave.</div>';
  }

  var html = '<div class="search-results">';
  if (userResults.length) {
    html += '<div class="search-section-title">Perfis</div>';
    userResults.forEach(function(u) {
      html += '<div class="follow-row" data-open-author="'+(u.uid||u._id)+'">' + avatarHtml(u.avatar||"https://api.dicebear.com/7.x/avataaars/svg?seed="+(u.uid||"x"),46) +
        '<div class="follow-row-info"><div class="follow-row-name">'+esc(u.name)+userVerifiedBadge(u,13)+'</div>' +
        '<div class="follow-row-username">'+esc(u.username||"")+'</div></div></div>';
    });
  }
  if (postResults.length) {
    html += '<div class="search-section-title">Publicações</div>';
    postResults.forEach(function(p) {
      var author = USERS[p.authorId] || { name: "Utilizador", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=x" };
      html += '<div class="follow-row" data-open-post="'+p.id+'">' + avatarHtml(author.avatar,40) +
        '<div class="follow-row-info"><div class="follow-row-name">'+esc(author.name)+'</div>' +
        '<div class="follow-row-username" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(p.text||"")+'</div></div></div>';
    });
  }
  html += '</div>';
  return html;
}

function renderChatBubbleContent(m) {
  if (m.type === "image") return '<img class="bubble-img" src="'+m.src+'" alt="">';
  if (m.type === "video") return '<video class="bubble-video" src="'+m.src+'" controls playsinline></video>';
  if (m.type === "audio") {
    var dur = m.duration || 0;
    var mm = Math.floor(dur/60), ss = String(Math.floor(dur%60)).padStart(2,"0");
    var bars = "";
    for (var i=0;i<18;i++) {
      var h = 6 + Math.round(Math.sin(i*1.3)*6) + 6;
      bars += '<span style="height:'+h+'px;background:'+(m.me?'rgba(255,255,255,.7)':'var(--accent)')+';"></span>';
    }
    return '<div class="audio-msg">' +
      '<button class="audio-play-btn" data-play-audio="'+m.id+'" style="background:'+(m.me?'rgba(255,255,255,.25)':'#fff0f6')+';color:'+(m.me?'#fff':'var(--accent)')+';">'+icoSvg("play",14,m.me?"#fff":C.accent,true)+'</button>' +
      '<div class="audio-wave">'+bars+'</div>' +
      '<span style="font-size:11px;color:'+(m.me?'rgba(255,255,255,.8)':'var(--muted)')+';">'+mm+':'+ss+'</span>' +
      '<audio data-audio-el="'+m.id+'" src="'+m.src+'" preload="metadata"></audio>' +
    '</div>';
  }
  return esc(m.text);
}

function bindAudioPlayback() {
  appEl.querySelectorAll("[data-play-audio]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var id = btn.getAttribute("data-play-audio");
      var audioEl = appEl.querySelector('[data-audio-el="'+id+'"]');

      if (audioEl.paused) {
        appEl.querySelectorAll("audio").forEach(function(a){ if (a!==audioEl) a.pause(); });
        audioEl.play();
        btn.innerHTML = icoSvg("pause",14, btn.style.color || C.accent, true);
      } else {
        audioEl.pause();
        btn.innerHTML = icoSvg("play",14, btn.style.color || C.accent, true);
      }
      audioEl.onended = function() { btn.innerHTML = icoSvg("play",14, btn.style.color || C.accent, true); };
    });
  });
}

function sendChatMessage() {
  var input = appEl.querySelector("[data-chat-input]");
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  
  var localId = uid();
  var chat = getChat(state.activeConvoId);
  var msgObj = { id:localId, _firestoreId: null, me:true, type:"text", text:text, time:nowTime() };
  chat.push(msgObj);
  
  var conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
  if (conv) { conv.last = text; conv.time = "agora"; }
  
  // FIX: Atualizar apenas o novo bubble, SEM fazer render() completo
  var chatBox = appEl.querySelector("[data-chat-msgs]");
  if (chatBox) {
    var bubbleRow = document.createElement("div");
    bubbleRow.className = "bubble-row me";
    bubbleRow.innerHTML = '<div class="bubble me text">' + esc(text) + 
      '<div class="bubble-time" style="color:rgba(255,255,255,.7);">' + msgObj.time + '</div></div>';
    chatBox.appendChild(bubbleRow);
  }
  
  input.value = "";
  input.focus(); // FIX: manter foco
  scrollChatToBottom();
  
  // Persiste no Firestore (assíncrono, não bloqueia)
  if (_idToken) {
    FB.sendMessage(state.activeConvoId, { type:"text", text:text }).then(function(doc){
      if (doc && doc.name) {
        var fsId = doc.name.split("/").pop();
        msgObj._firestoreId = fsId;
        var _conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
        var _members = _conv && _conv.userId ? [ME_ID, _conv.userId] : [ME_ID];
        fsSet("convos/"+ state.activeConvoId, { lastMsg: text, lastTime: new Date().toISOString(), members: _members });
      }
    }).catch(function(){
      showToast("⚠️ Erro ao enviar. Tentando novamente...");
      setTimeout(function() {
        if (_idToken) {
          FB.sendMessage(state.activeConvoId, { type:"text", text:text }).catch(function(){
            showToast("Erro ao enviar mensagem 😞");
          });
        }
      }, 2000);
    });
  }
}

function scrollChatToBottom() {
  setTimeout(function() {
    var box = appEl.querySelector("[data-chat-msgs]");
    if (box) box.scrollTop = box.scrollHeight;
  }, 0);
}

// ─── AUDIO RECORDING ──────────────────────────────────────────
function startAudioRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast("Microfone não disponível neste dispositivo/navegador.");
    return;
  }
  
  // FIX: Se já temos stream e permissão cacheda, reusar ao invés de pedir novamente
  if (_cachedAudioStream && _audioPermissionGranted) {
    console.log("✅ Reutilizando stream de áudio cacheado (permissão já concedida)");
    beginAudioRecording(_cachedAudioStream);
    return;
  }
  
  // Caso contrário, pedir permissão uma vez
  var permissionOptions = { audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } };
  navigator.mediaDevices.getUserMedia(permissionOptions).then(function(stream) {
    // FIX: Cachear stream e marcar que permissão foi concedida
    _cachedAudioStream = stream;
    _audioPermissionGranted = true;
    console.log("🎤 Permissão concedida e stream cacheado");
    beginAudioRecording(stream);
  }).catch(function(err) {
    _audioPermissionGranted = false;
    _cachedAudioStream = null;
    showToast("Não foi possível acessar o microfone. Verifique a permissão.");
    console.error("Erro ao acessar microfone:", err);
  });
}

// FIX: Função separada que inicia a gravação com uma stream já obtida
function beginAudioRecording(stream) {
  recordingStream = stream;
  recordedChunks = [];
  try {
    mediaRecorder = new MediaRecorder(stream);
  } catch (e) {
    showToast("Gravação de áudio não suportada aqui.");
    stream.getTracks().forEach(function(t){ t.stop(); });
    return;
  }
  mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = function() {
    var mimeType = mediaRecorder.mimeType || "audio/webm";
    var blob = new Blob(recordedChunks, { type: mimeType });
    var duration = Math.round((Date.now() - recordingStartTime) / 1000);
    if (blob.size === 0 || !recordedChunks.length) {
      showToast("Áudio vazio. Grave algo.");
      return;
    }
    if (blob.size > 10000000) {
      showToast("Áudio muito grande. Máximo 10MB.");
      return;
    }
    cloudinaryWidget.uploadAudioBlobToCloudinary(blob, function(cloudinaryUrl) {
      var chat = getChat(state.activeConvoId);
      var msgObj = { id:uid(), _firestoreId:null, me:true, type:"audio", src:cloudinaryUrl, duration:duration, time:nowTime() };
      chat.push(msgObj);
      var conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
      if (conv) { conv.last = "🎤 Áudio"; conv.time = "agora"; }
      render();
      scrollChatToBottom();
      
      if (_idToken) {
        FB.sendMessage(state.activeConvoId, { type:"audio", audio:cloudinaryUrl }).then(function(doc){
          if (doc && doc.name) {
            var fsId = doc.name.split("/").pop();
            msgObj._firestoreId = fsId;
            var _conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
            var _members = _conv && _conv.userId ? [ME_ID, _conv.userId] : [ME_ID];
            fsSet("convos/"+ state.activeConvoId, { lastMsg: "🎤 Áudio", lastTime: new Date().toISOString(), members: _members });
          }
        }).catch(function(){
          showToast("Erro ao enviar áudio.");
        });
      }
    });
    try {
      recordingStream.getTracks().forEach(function(t){ t.stop(); });
    } catch(e) {}
  };
  mediaRecorder.start();
  recordingStartTime = Date.now();
  showRecordingUI();
  recordingAutoStopTimer = setTimeout(function() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      showToast("Tempo máximo de áudio atingido (" + MAX_AUDIO_SECONDS + "s).");
      stopAudioRecording();
    }
  }, MAX_AUDIO_SECONDS * 1000);
}

function stopAudioRecording() {
  if (recordingAutoStopTimer) { clearTimeout(recordingAutoStopTimer); recordingAutoStopTimer = null; }
  if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
  hideRecordingUI();
}

function showRecordingUI() {
  var row = appEl.querySelector("[data-chat-input-row]");
  if (!row) return;
  var indicator = document.createElement("div");
  indicator.className = "rec-indicator";
  indicator.setAttribute("data-rec-indicator","1");
  indicator.innerHTML =
    '<div class="rec-dot"></div>' +
    '<span style="font-size:13px;color:var(--text);flex:1;">Gravando áudio…</span>' +
    '<button class="icon-btn" data-cancel-rec style="color:var(--muted);">'+icoSvg("trash",20)+'</button>' +
    '<button class="chat-send" data-stop-rec>'+icoSvg("send",18,"#fff")+'</button>';
  row.appendChild(indicator);
  indicator.querySelector("[data-stop-rec]").addEventListener("click", stopAudioRecording);
  indicator.querySelector("[data-cancel-rec]").addEventListener("click", function() {
    if (recordingAutoStopTimer) { clearTimeout(recordingAutoStopTimer); recordingAutoStopTimer = null; }
    if (mediaRecorder) {
      mediaRecorder.onstop = function() { recordingStream.getTracks().forEach(function(t){ t.stop(); }); };
      mediaRecorder.stop();
    }
    hideRecordingUI();
  });
}
function hideRecordingUI() {
  var indicator = appEl.querySelector("[data-rec-indicator]");
  if (indicator) indicator.remove();
}

// ─── CALLS (simulated) ────────────────────────────────────────
function startCall(type) {
  var conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
  if (!conv) return;
  activeCall = { conv:conv, type:type, status:"calling", seconds:0, muted:false };
  render();
  setTimeout(function() {
    if (!activeCall) return;
    activeCall.status = "connected";
    render();
    startCallTimer();
  }, 1800);
}

function startCallTimer() {
  clearInterval(callTimerInterval);
  callTimerInterval = setInterval(function() {
    if (!activeCall) { clearInterval(callTimerInterval); return; }
    activeCall.seconds++;
    var el = document.querySelector("[data-call-timer]");
    if (el) el.textContent = formatCallTime(activeCall.seconds);
  }, 1000);
}

function formatCallTime(s) {
  var mm = Math.floor(s/60), ss = String(s%60).padStart(2,"0");
  return String(mm).padStart(2,"0")+":"+ss;
}

function renderCallScreen() {
  var conv = activeCall.conv;
  var u = USERS[conv.userId];
  var statusText = activeCall.status === "calling" ? "Chamando…" : formatCallTime(activeCall.seconds);
  return '<div class="call-screen fade-in">' +
    '<div class="call-status">' +
      '<p class="call-sub">'+(activeCall.type==="video"?"Chamada de vídeo":"Chamada de voz")+'</p>' +

      '<div style="width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.3);'+(activeCall.status==="calling"?"animation:pulse 1.6s infinite;":"")+'">' +
        '<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:contain;object-position:center;display:block;margin:0 auto;">' +
      '</div>' +
      '<div><p class="call-name">'+esc(u.name)+'</p><p class="call-sub" data-call-timer>'+statusText+'</p></div>' +
    '</div>' +
    '<div class="call-controls">' +
      '<button class="call-ctrl-btn '+(activeCall.muted?"active":"")+'" data-toggle-mute>'+icoSvg(activeCall.muted?"micOff":"mic",24)+'</button>' +
      '<button class="call-end-btn" data-end-call>'+icoSvg("phone",26,"#fff",true)+'</button>' +
      '<button class="call-ctrl-btn" data-toggle-speaker>'+icoSvg(activeCall.type==="video"?"videoCall":"phone",24)+'</button>' +
    '</div>' +
  '</div>';
}

function bindCallScreen() {
  var endBtn = document.querySelector("[data-end-call]");

  if (tab === "curtidas") return posts.filter(function(p){ return p.likedBy.indexOf(userId) !== -1 && (p.img||p.video); });
  if (tab === "salvos") return userId===ME_ID ? posts.filter(function(p){ return p.saved && (p.img||p.video); }) : [];

    _editingBioField = false;
    state.editProfileOpen = false;
    render();
    // persiste no Firestore (remove _id que é só uso interno)
    if (_idToken) {
      var toSave = {};
      Object.keys(u).forEach(function(k){ if (k !== "_id") toSave[k] = u[k]; });
      fsSet("users/"+ME_ID, toSave).then(function(){
        showToast("Perfil atualizado! 🎀");
      }).catch(function(){
        showToast("Erro ao salvar. Tenta novamente.");
      });
    } else {
      showToast("Perfil atualizado localmente.");
    }
  });
}

function renderEmojiPanel() {
  var grid = EMOJIS.map(function(e){ return '<button data-emoji-pick="'+e+'">'+e+'</button>'; }).join("");
  return '<div class="emoji-panel" data-emoji-panel><div class="emoji-grid">'+grid+'</div></div>';
}

function toggleEmojiPanel(target) {
  var existing = document.querySelector("[data-emoji-panel]");
  if (existing) {
    existing.remove();
    if (state.emojiTarget === target) { state.emojiTarget = null; return; }
  }
  state.emojiTarget = target;
  var anchor = target === "create"
    ? document.querySelector(".create-toolbar")
    : document.querySelector("[data-chat-input-row]");
  if (!anchor) return;
  anchor.style.position = "relative";
  var panel = document.createElement("div");
  panel.innerHTML = renderEmojiPanel();
  var panelEl = panel.firstChild;
  anchor.appendChild(panelEl);
  panelEl.querySelectorAll("[data-emoji-pick]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var emoji = btn.getAttribute("data-emoji-pick");
      var inputEl = target === "create"
        ? document.querySelector("[data-post-text]")
        : document.querySelector("[data-chat-input]");
      if (inputEl) {
        var start = inputEl.selectionStart || inputEl.value.length;
        var end = inputEl.selectionEnd || inputEl.value.length;
        inputEl.value = inputEl.value.slice(0,start) + emoji + inputEl.value.slice(end);
        inputEl.focus();
        inputEl.selectionStart = inputEl.selectionEnd = start + emoji.length;
        inputEl.dispatchEvent(new Event("input"));
      }
    });
  });
}

function bindCreatePost() {
  var closeBtn = appEl.querySelector("[data-close-create]");
  var submitBtn = appEl.querySelector("[data-submit-post]");
  var textarea = appEl.querySelector("[data-post-text]");
  var charCount = appEl.querySelector("[data-char-count]");
  var fileInput = appEl.querySelector("[data-create-file-input]");

  if (textarea) {
    textarea.focus();
    var updateCount = function() {
      var remaining = 280 - textarea.value.length;
      if (charCount) {
        charCount.textContent = remaining;
        charCount.style.color = remaining < 40 ? "#e0507a" : "var(--muted)";
      }
      if (submitBtn) submitBtn.style.opacity = textarea.value.trim() ? "1" : "0.5";
    };
    textarea.addEventListener("input", updateCount);
    textarea.addEventListener("focus", function() { _editingPostField = true; });
    textarea.addEventListener("blur", function() { _editingPostField = false; });
    updateCount();
  }

  appEl.querySelectorAll("[data-pick-media]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var kind = btn.getAttribute("data-pick-media");
      if (kind === "audio") {
        cloudinaryWidget.uploadAudio();
      } else if (kind === "video") {
        cloudinaryWidget.uploadVideo();
      } else if (kind === "image") {
        cloudinaryWidget.uploadImage();
      }
    });
  });
  // Fallback: usar file input se Cloudinary não estiver disponível
  if (fileInput) {
    fileInput.addEventListener("change", function() {
      var file = fileInput.files[0];
      if (!file) return;
      var kind = fileInput.getAttribute("data-kind");
      if (kind === "image") {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var maxW = 1024, maxH = 1024;
            var w = img.width, h = img.height;
            if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
            if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
            var canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            compose.media = canvas.toDataURL("image/jpeg", 0.75);
            compose.mediaType = "image";
            render();
            var ta = appEl.querySelector("[data-post-text]");
            if (ta) ta.focus();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      } else if (kind === "audio") {
        var readerAudio = new FileReader();
        readerAudio.onload = function() {
          compose.media = readerAudio.result;
          compose.mediaType = "audio";
          render();
          var ta = appEl.querySelector("[data-post-text]");
          if (ta) ta.focus();
        };
        readerAudio.readAsDataURL(file);
      } else {
        var reader = new FileReader();
        reader.onload = function() {
          compose.media = reader.result;
          compose.mediaType = kind;
          render();
          var ta = appEl.querySelector("[data-post-text]");
          if (ta) ta.focus();
        };
        reader.readAsDataURL(file);
      }
    });
  }
  var removeMediaBtn = appEl.querySelector("[data-remove-media]");
  if (removeMediaBtn) removeMediaBtn.addEventListener("click", function() {
    compose.media = null; compose.mediaType = null; render();
  });

  var pickLocBtn = appEl.querySelector("[data-pick-loc]");
  if (pickLocBtn) pickLocBtn.addEventListener("click", function() {
    if (!navigator.geolocation) { showToast("Localização não disponível neste dispositivo."); return; }
    showToast("Obtendo localização…");
    navigator.geolocation.getCurrentPosition(function(pos) {
      var lat = pos.coords.latitude.toFixed(4);
      var lon = pos.coords.longitude.toFixed(4);
      compose.loc = lat + ", " + lon;
      render();
    }, function() {
      showToast("Não foi possível obter sua localização. Verifique a permissão.");
    }, { timeout:10000 });
  });
  var removeLocBtn = appEl.querySelector("[data-remove-loc]");
  if (removeLocBtn) removeLocBtn.addEventListener("click", function() { compose.loc = null; render(); });

  var emojiBtn = appEl.querySelector("[data-pick-emoji]");
  if (emojiBtn) emojiBtn.addEventListener("click", function() { toggleEmojiPanel("create"); });

  if (submitBtn) {
    submitBtn.addEventListener("click", function() {
      var ta = appEl.querySelector("[data-post-text]");
      var text = ta ? ta.value.trim() : "";
      if (!text && !compose.media) return;
      var newPost = {
        id:"p_"+uid(), authorId:ME_ID, text:text,
        img: compose.mediaType === "image" ? compose.media : null,
        video: compose.mediaType === "video" ? compose.media : null,
        audio: compose.mediaType === "audio" ? compose.media : null,
        loc: compose.loc,
        likedBy:[], saved:false, time:"agora",
      };
      posts.unshift(newPost);
      FB.createPost(newPost);
      state.creating = false;
      state.page = "feed";
      state.viewProfileId = null;
      state.postDetailId = null;
      compose = { media:null, mediaType:null, loc:null };
      render();
      window.scrollTo(0,0);
      showToast("Publicado! 🎀");
    });
  }
  if (closeBtn) closeBtn.addEventListener("click", function() {
    state.creating = false;
    compose = { media:null, mediaType:null, loc:null };
    render();
  });
}

function onAuthSuccess(u) {
  if (!u) return;
  state.user = u;
  render();
  FB._checkRules();

  // ── Posts reais do Firestore ──────────────────────────
  FB.loadPosts().then(function(){ render(); }).catch(function(){});
  // (loadPosts só substitui se houver posts no Firestore)

  // ── Stories reais do Firestore (evita que somam ao recarregar) ─
  FB.loadStories().then(function(){ render(); }).catch(function(){});

  // ── Conversas ────────────────────────────────────────
  FB.loadConvos().then(function(){ render(); checkOnlineStatus(CONVOS); }).catch(function(){});

  // ── Presença ─────────────────────────────────────────
  startPresence();
  startStoryPolling();

  // ── Notificações reais (substitui as demo) ────────────
  FB.loadNotifs().then(function(docs) {
    NOTIFS.length = 0; // limpa demos
    docs.forEach(function(doc) {
      NOTIFS.push({
        id: uid(), _fsId: doc._id,
        type: doc.type || "like",
        userId: doc.fromUid || "",
        _fromName: doc.fromName || "",
        _fromAvatar: doc.fromAvatar || "",
        text: doc.text || "",
        time: doc.createdAt ? _relTime(doc.createdAt) : "antes",
        read: !!doc.read,
      });
      if (doc.fromUid && !USERS[doc.fromUid] && doc.fromName) {
        USERS[doc.fromUid] = {
          uid: doc.fromUid, name: doc.fromName,
          username: "@" + doc.fromName.toLowerCase().replace(/\s+/g,""),
          avatar: doc.fromAvatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+doc.fromUid,
          verified:false, followers:[], following:[],
        };
      }
    });
    _lastNotifCheck = new Date().toISOString();
    render();
  }).catch(function(){});
  startNotifPolling();
}

  var overlay = document.createElement("div");
  overlay.setAttribute("data-fp-overlay","1");

  var el = document.querySelector('[data-fp-overlay]');
  if (el) el.remove();
}

function fpIcon(name) {
  return icoSvg(name, 30, "#fff", false);
}

function passwordStrength(pw) {
  var score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)) score++;
  return Math.min(score, 4);
}

function bindForgotPasswordFlow() {
  var overlay = document.querySelector('[data-fp-overlay]');
  if (!overlay) return;

  var backBtn = overlay.querySelector('[data-fp-back]');
  if (backBtn) backBtn.addEventListener("click", closeForgotPasswordFlow);

  // ── Step 1: identify ──
  var sendBtn = overlay.querySelector('[data-fp-send]');
  if (sendBtn) sendBtn.addEventListener("click", function() {
    var idEl = overlay.querySelector('[data-fp-identifier]');
    var val = idEl ? idEl.value.trim() : "";
    if (!val) { showToast("Digite seu e-mail cadastrado."); return; }
    fpState.identifier = val;
    fpState.loading = true;
    renderForgotPasswordFlow();
    fetch(FIRE_AUTH+":sendOobCode?key="+CFG.apiKey, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ requestType:"PASSWORD_RESET", email:val })
    }).then(function(r){ return r.json(); }).then(function(d){
      fpState.loading = false;
      if (d.error) {
        showToast("Erro: " + d.error.message);
        renderForgotPasswordFlow();
      } else {
        fpState.step = "sent";
        fpState.code = "";
        renderForgotPasswordFlow();
        startFpResendTimer();
        showToast("Link e código enviados! Verifique seu e-mail. 📩");
      }
    }).catch(function(){
      fpState.loading = false;
      showToast("Não foi possível enviar agora. Tente novamente.");
      renderForgotPasswordFlow();
    });
  });

  var idInput = overlay.querySelector('[data-fp-identifier]');
  if (idInput) idInput.addEventListener("keydown", function(e){ if (e.key==="Enter") sendBtn && sendBtn.click(); });

  // ── Step 2: sent / code ──
  var verifyBtn = overlay.querySelector('[data-fp-verify]');
  if (verifyBtn) verifyBtn.addEventListener("click", function() {
    var codeEl = overlay.querySelector('[data-fp-code]');
    var code = codeEl ? codeEl.value.trim() : "";
    if (code.length < 4) { showToast("Digite o código recebido por e-mail."); return; }
    // Não há verificação de código custom via REST do Firebase Auth;
    // o usuário confirma a troca pelo link enviado por e-mail.
    fpState.code = code;
    fpState.step = "newpw";
    fpState.pw1 = ""; fpState.pw2 = "";
    renderForgotPasswordFlow();
  });
  var codeInput = overlay.querySelector('[data-fp-code]');
  if (codeInput) codeInput.addEventListener("keydown", function(e){ if (e.key==="Enter") verifyBtn && verifyBtn.click(); });

  var resendBtn = overlay.querySelector('[data-fp-resend]');
  if (resendBtn) resendBtn.addEventListener("click", function() {
    if (fpState.resendSeconds > 0) return;
    fetch(FIRE_AUTH+":sendOobCode?key="+CFG.apiKey, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ requestType:"PASSWORD_RESET", email:fpState.identifier })
    }).then(function(r){ return r.json(); }).then(function(d){
      if (d.error) showToast("Erro: " + d.error.message);
      else showToast("Código reenviado! 📩");
    }).catch(function(){});
    startFpResendTimer();
  });

  // ── Step 3: new password ──
  overlay.querySelectorAll('[data-fp-pw-toggle]').forEach(function(btn) {
    btn.addEventListener("click", function() {
      var which = btn.getAttribute("data-fp-pw-toggle");
      var input = overlay.querySelector('[data-fp-'+which+']');
      if (!input) return;
      var showing = input.type === "text";
      input.type = showing ? "password" : "text";
      btn.innerHTML = icoSvg(showing ? "eye" : "eyeOff", 19, "var(--muted)");
    });
  });
  var pw1El = overlay.querySelector('[data-fp-pw1]');
  if (pw1El) pw1El.addEventListener("input", function(){ fpState.pw1 = pw1El.value; renderForgotPasswordFlow(); var f=document.querySelector('[data-fp-pw1]'); if(f){f.focus(); f.setSelectionRange(f.value.length,f.value.length);} });
  var pw2El = overlay.querySelector('[data-fp-pw2]');
  if (pw2El) pw2El.addEventListener("input", function(){ fpState.pw2 = pw2El.value; });

  var resetBtn = overlay.querySelector('[data-fp-reset]');
  if (resetBtn) resetBtn.addEventListener("click", function() {
    var pw1 = (overlay.querySelector('[data-fp-pw1]')||{}).value || "";
    var pw2 = (overlay.querySelector('[data-fp-pw2]')||{}).value || "";
    if (pw1.length < 6) { showToast("A senha deve ter pelo menos 6 caracteres."); return; }
    if (pw1 !== pw2) { showToast("As senhas não coincidem."); return; }
    resetBtn.textContent = "Aguarde…";
    resetBtn.disabled = true;
    // Em produção: aplicar resetPassword via oobCode do link recebido por e-mail.
    // Aqui confirmamos visualmente o fluxo concluído.
    setTimeout(function() {
      fpState.step = "success";
      renderForgotPasswordFlow();
    }, 700);
  });

  // ── Support ──
  overlay.querySelectorAll('[data-fp-support]').forEach(function(el) {
    el.addEventListener("click", function() {
      showToast("Suporte: contato@mimi.app 💌");
    });
  });

  // ── Done ──
  var doneBtn = overlay.querySelector('[data-fp-done]');
  if (doneBtn) doneBtn.addEventListener("click", closeForgotPasswordFlow);
}

function startFpResendTimer() {
  clearInterval(fpResendTimer);
  fpState.resendSeconds = 45;
  renderForgotPasswordFlow();
  fpResendTimer = setInterval(function() {
    fpState.resendSeconds--;
    if (fpState.resendSeconds <= 0) {
      clearInterval(fpResendTimer);
      fpState.resendSeconds = 0;
    }
    var btn = document.querySelector('[data-fp-resend]');
    if (btn) {
      btn.textContent = fpState.resendSeconds > 0 ? "Reenviar em "+fpState.resendSeconds+"s" : "Reenviar código";
      btn.disabled = fpState.resendSeconds > 0;
    }
  }, 1000);
}

(function restoreSession() {
  // Splash some por no mínimo ~1.5s, dando tempo da animação aparecer
  setTimeout(hideSplash, 1500);
  
  // Timeout de segurança: se a inicialização travar, mostra o app de qualquer forma
  var safetyTimeout = setTimeout(function() {
    console.warn("⏱️ Timeout na inicialização (30s) - forçando renderização do app");
    if (!state.user) {
      state.user = { uid: "demo", name: "Usuário", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=demo", email: "demo@mimi.app" };
    }
    render();
  }, 30000);
  
  // Restaura tema salvo
  try {
    var savedTheme = localStorage.getItem("mimi_theme");
    if (savedTheme) applyTheme(savedTheme);
  } catch(e) {}
  try {
    var saved = localStorage.getItem("mimi_session");
    if (!saved) { clearTimeout(safetyTimeout); render(); return; }
    var sess = JSON.parse(saved);
    if (!sess.idToken || !sess.uid) { clearTimeout(safetyTimeout); render(); return; }
    // Valida o token com o Firebase antes de usar
    fetch(FIRE_AUTH+":lookup?key="+CFG.apiKey, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ idToken: sess.idToken })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.error || !d.users || !d.users[0]) {
        localStorage.removeItem("mimi_session");
        clearTimeout(safetyTimeout);
        render(); return;
      }
      _idToken = sess.idToken;
      _fbUid   = sess.uid;
      return FB._loadOrCreateUser(sess.uid, d.users[0].email, d.users[0].displayName||"");
    })
    .then(function(u){
      if (u) {
        clearTimeout(safetyTimeout);
        state.user = u;
        render(); // mostra o app imediatamente enquanto carrega dados

        // ── 1. Posts do Firestore ─────────────────────────────
        FB.loadPosts().then(function(){
          render();
        }).catch(function(){});

        // ── 1b. Stories do Firestore (evita que somam ao recarregar) ──
        FB.loadStories().then(function(){
          render();
        }).catch(function(){});

        // ── 2. Conversas ─────────────────────────────────────
        FB.loadConvos().then(function(){ render(); checkOnlineStatus(CONVOS); }).catch(function(){});

        // ── 3. Presença online ────────────────────────────────
        startPresence();
        startStoryPolling();

        // ── 4. Notificações ──────────────────────────────────
        FB.loadNotifs().then(function(docs) {
          // Limpa as notificações demo (sem _fsId) e carrega as reais
          NOTIFS.length = 0;
          docs.forEach(function(doc) {
            NOTIFS.push({
              id: uid(), _fsId: doc._id,
              type: doc.type || "like",
              userId: doc.fromUid || "",
              _fromName: doc.fromName || "",
              _fromAvatar: doc.fromAvatar || "",
              text: doc.text || "",
              time: doc.createdAt ? _relTime(doc.createdAt) : "antes",
              read: !!doc.read,
            });
            if (doc.fromUid && !USERS[doc.fromUid] && doc.fromName) {
              USERS[doc.fromUid] = {
                uid: doc.fromUid, name: doc.fromName,
                username: "@" + doc.fromName.toLowerCase().replace(/\s+/g,""),
                avatar: doc.fromAvatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+doc.fromUid,
                verified:false, followers:[], following:[],
              };
            }
          });
          _lastNotifCheck = new Date().toISOString();
          render();
        }).catch(function(){});

        // ── 5. Polling de notificações ────────────────────────
        startNotifPolling();
      }
    })
    .catch(function(){ clearTimeout(safetyTimeout); render(); });
  } catch(e) { clearTimeout(safetyTimeout); render(); }
})();

      compose.media = url;
      compose.mediaType = "image";
      showToast("📸 Foto selecionada");
      render();
    });
  },

  uploadVideo: function() {
    var self = this;
    this.initWidget("video", function(url) {
      compose.media = url;
      compose.mediaType = "video";
      showToast("🎥 Vídeo selecionado");
      render();
    });
  },

  uploadAudio: function() {
    var self = this;
    this.initWidget("audio", function(url) {
      compose.media = url;
      compose.mediaType = "audio";
      showToast("🎵 Áudio selecionado");
      render();
    });
  },

  // ✅ NOVO: Para Chat - Foto (com fallback se widget falhar)
  uploadImageForChat: function(callback) {
    var self = this;
    
    // Se Cloudinary widget carregou, usa widget
    if (window.cloudinary && window.cloudinary.createUploadWidget) {
      console.log("✅ Widget disponível - usando widget");
      this.initWidget("image", callback);
    } else {
      console.warn("⚠️ Widget não disponível - usando file input direto");
      this.showFilePickerForChat("image", callback);
    }
  },

  // ✅ NOVO: Para Chat - Vídeo (com fallback se widget falhar)
  uploadVideoForChat: function(callback) {
    var self = this;
    
    // Se Cloudinary widget carregou, usa widget
    if (window.cloudinary && window.cloudinary.createUploadWidget) {
      console.log("✅ Widget disponível - usando widget");
      this.initWidget("video", callback);
    } else {
      console.warn("⚠️ Widget não disponível - usando file input direto");
      this.showFilePickerForChat("video", callback);
    }
  },

  // ✅ NOVO: File picker fallback (alternativa ao widget)
  showFilePickerForChat: function(mediaType, callback) {
    var self = this;
    var fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = mediaType === "image" 
      ? "image/jpeg,image/png,image/gif,image/webp" 
      : "video/mp4,video/quicktime,video/x-msvideo,video/webm";
    
    fileInput.onchange = function(e) {
      var file = e.target.files[0];
      if (file) {
        self.uploadDirectFile(file, mediaType, callback);
      }
    };
    
    fileInput.click();
  },

  uploadDirectFile: function(file, mediaType, callback) {
    var self = this;
    var maxRetries = 3;
    var attempt = 0;
    var cloudName = self.cloudName;
    var uploadPresets = self.uploadPresets;
    
    function doUpload() {
      attempt++;
      console.log("📤 Iniciando upload direto para Cloudinary (tentativa " + attempt + "/" + maxRetries + ")...", file.name);
      
      var resourceType = mediaType === "audio" ? "auto" : mediaType === "video" ? "video" : "image";
      var presetName = uploadPresets[mediaType];
      
      if (!presetName) {
        console.error("❌ Preset não encontrado para tipo:", mediaType);
        showToast("❌ Tipo de arquivo não suportado");
        return;
      }
      
      var formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", presetName);
      formData.append("cloud_name", cloudName);
      formData.append("folder", "mimi_app");
      
      showToast("⏳ Enviando " + mediaType + "... (tentativa " + attempt + ")");
      
      var uploadTimeout = setTimeout(function() {
        console.warn("⏱️ Upload timeout - tentando novamente...");
        if (attempt < maxRetries) {
          doUpload();
        } else {
          showToast("❌ Timeout ao enviar. Verifique sua conexão e tente novamente.");
        }
      }, 60000);
      
      fetch("https://api.cloudinary.com/v1_1/" + cloudName + "/" + resourceType + "/upload", {
        method: "POST",
        body: formData
      })
        .then(function(res) {
          clearTimeout(uploadTimeout);
          console.log("📡 Resposta Cloudinary (status):", res.status);
          return res.json();
        })
        .then(function(data) {
          console.log("✅ Upload response:", data);
          
          if (data.secure_url) {
            console.log("✅ URL obtida:", data.secure_url);
            if (typeof callback === "function") {
              callback(data.secure_url);
            }
            var messages = {
              audio: "🎵 Áudio enviado!",
              video: "🎥 Vídeo enviado!",
              image: "📸 Foto enviada!"
            };
            showToast(messages[mediaType] || "✅ Arquivo enviado!");
          } else if (data.error) {
            console.error("❌ Erro do servidor Cloudinary:", data.error);
            if (attempt < maxRetries) {
              doUpload();
            } else {
              showToast("❌ Erro: " + (data.error.message || "Desconhecido"));
            }
          } else {
            console.error("❌ Resposta inválida:", data);
            if (attempt < maxRetries) {
              doUpload();
            } else {
              showToast("❌ Erro ao enviar arquivo");
            }
          }
        })
        .catch(function(err) {
          clearTimeout(uploadTimeout);
          console.error("❌ Erro na requisição:", err);
          if (attempt < maxRetries) {
            console.log("🔄 Tentando novamente...");
            doUpload();
          } else {
            showToast("❌ Falha na conexão: " + err.message);
          }
        });
    }
    
    doUpload();
  },

  uploadAudioBlobToCloudinary: function(audioBlob, callback) {
    this.uploadDirectFile(audioBlob, "audio", callback);
  }
};

// ─── INIT ─────────────────────────────────────────────────────
// ✅ Sistema de upload otimizado (upload direto via API)
console.log("✅ Sistema MIMI inicializado com sucesso!");
console.log("📤 Uploads funcionarão via API direto do Cloudinary");
console.log("🔧 Cloud Name:", window.CLOUDINARY_CLOUD_NAME || "mimi-app");
</script>

<style>
  :root{
    --bg:#fff5f8; --surface:#ffffff; --card:#ffffff; --border:#ffe0ec;
    --accent:#ff6fa5; --accentL:#ffa6c9; --pink:#ff4d8d; --green:#5fd9a4;
    --text:#4a3b45; --sub:#b08a9c; --muted:#e3b8cc;
  }
  body.theme-dark {
    --bg:#1a1020; --surface:#251830; --card:#251830; --border:#3a2545;
    --accent:#ff6fa5; --accentL:#ffa6c9; --pink:#ff4d8d; --green:#5fd9a4;
    --text:#f0e0ea; --sub:#c49ab8; --muted:#6a4a60;
  }
  body.theme-yellow {
    --bg:#fffbea; --surface:#ffffff; --card:#ffffff; --border:#ffe78a;
    --accent:#f5a623; --accentL:#f7c96e; --pink:#e88a00; --green:#5fd9a4;
    --text:#3a2e00; --sub:#8a6a00; --muted:#e8d080;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); overscroll-behavior-y: none; height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:var(--text);
  }
  .display { font-weight:800; letter-spacing:-0.5px; }
  ::-webkit-scrollbar { display:none; }
  input, textarea, button { font-family: inherit; }
  button { -webkit-user-select:none; user-select:none; }
  #app { min-height: 100vh; max-width:480px; margin:0 auto; position:relative; background:var(--bg); }
  img, video { -webkit-user-drag:none; }
  .row { display:flex; align-items:center; }
  .grow { flex:1; }
  .icon-btn { background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; }
  .scroll-x { display:flex; overflow-x:auto; scrollbar-width:none; }
  .hidden { display:none !important; }
  .fade-in { animation: fadeIn .15s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  .btn { border-radius:16px; cursor:pointer; padding:11px 20px; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:6px; border:none; }
  .btn-sm { padding:7px 14px; font-size:13px; }
  .btn-full { width:100%; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accentL)); color:#fff; box-shadow:0 4px 14px rgba(255,111,165,.35); }
  .btn-secondary { background:var(--bg); color:var(--sub); border:1px solid var(--border); }
  .btn-danger { background:#fff0f0; color:#e0507a; border:1px solid #ffd3df; }

  .input { background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:12px 14px; color:var(--text); font-size:14px; outline:none; width:100%; }
  .avatar { border-radius:50%; object-fit:contain;object-position:center;display:block;margin:0 auto; background:var(--surface); display:block; flex-shrink:0; }
  .avatar-ring { border:1.5px solid var(--border); }
  .avatar-ring-accent { border:2.5px solid var(--accent); }

  .page-header { padding:14px 16px 10px; background:var(--bg); position:sticky; top:0; z-index:10; border-bottom:1px solid var(--border); }
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -4px 16px rgba(255,111,165,.08); }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:16px 4px; background:none; border:none; cursor:pointer; color:var(--muted); position:relative; }
  .nav-btn.active { color:var(--accent); }
  .nav-label { font-size:10px; font-weight:500; }
  .nav-btn.active .nav-label { font-weight:700; }
  .nav-badge { position:absolute; top:6px; right:calc(50% - 18px); background:var(--accent); color:#fff; font-size:10px; font-weight:700; border-radius:20px; min-width:17px; height:17px; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid var(--surface); }

  .stories-wrap { display:flex; gap:12px; overflow-x:auto; padding:4px 16px 8px; scrollbar-width:none; }
  .story { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; }
  .story-ring { padding:2.5px; border-radius:50%; background:var(--muted); }
  .story-ring.unseen { background:linear-gradient(135deg,var(--accent),var(--accentL),#ffd6e8); }
  .story-ring-inner { padding:2px; border-radius:50%; background:var(--bg); }
  .story-name { font-size:11px; color:var(--sub); max-width:62px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .story-name.seen { color:var(--muted); }
  .story-plus { margin-top:-20px; margin-left:38px; position:relative; background:var(--accent); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg); }

  .post-card { background:var(--card); border-bottom:1px solid var(--border); }
  .post-head { display:flex; align-items:center; gap:10px; padding:12px 14px 8px; }
  .post-name { font-weight:700; font-size:14px; color:var(--text); }
  .post-meta { display:flex; gap:6px; align-items:center; }
  .post-sub { font-size:12px; color:var(--muted); }
  .post-text { padding:0 14px 10px; margin:0; font-size:14.5px; line-height:1.6; white-space:pre-wrap; }
  .post-img { width:100%; max-height:420px; object-fit:contain;object-position:center;display:block;margin:0 auto; display:block; }
  .post-video { width:100%; max-height:420px; display:block; background:#000; }

  /* ── Custom Video Player ─────────────────────────────────── */
  .mimi-player { position:relative; width:100%; background:#000; overflow:hidden; user-select:none; }
  .mimi-player video { width:100%; max-height:420px; display:block; object-fit:contain;object-position:center;display:block;margin:0 auto; }
  .mimi-player-overlay { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-between; pointer-events:none; }
  .mimi-player-overlay.active { pointer-events:all; }

  /* Big play button centered */
  .mimi-play-center { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:all; }
  .mimi-play-ring { width:62px; height:62px; border-radius:50%; background:rgba(255,255,255,.18); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:2px solid rgba(255,255,255,.55); display:flex; align-items:center; justify-content:center; transition:transform .12s, background .12s; }
  .mimi-play-ring:active { transform:scale(.9); background:rgba(255,111,165,.45); }

  /* Top bar: muted + timer */
  .mimi-top-bar { display:flex; justify-content:space-between; align-items:center; padding:10px 12px 0; pointer-events:all; }
  .mimi-time-badge { background:rgba(0,0,0,.52); color:#fff; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:20px; letter-spacing:.3px; }
  .mimi-mute-btn { background:rgba(0,0,0,.52); border:none; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

  /* Bottom controls bar */
  .mimi-bottom-bar { padding:0 0 0 0; }
  .mimi-progress-wrap { position:relative; height:20px; display:flex; align-items:center; cursor:pointer; padding:0 12px; pointer-events:all; }
  .mimi-progress-track { flex:1; height:3px; background:rgba(255,255,255,.25); border-radius:3px; position:relative; overflow:hidden; }
  .mimi-progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accentL)); border-radius:3px; width:0%; transition:width .1s linear; }
  .mimi-progress-thumb { position:absolute; top:50%; transform:translate(-50%,-50%); width:13px; height:13px; border-radius:50%; background:#fff; box-shadow:0 0 0 3px var(--accent); left:0%; pointer-events:none; }

  .mimi-ctrl-row { display:flex; align-items:center; gap:8px; padding:2px 10px 10px; pointer-events:all; }
  .mimi-ctrl-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:4px; color:#fff; }
  .mimi-fullscreen-btn { margin-left:auto; background:rgba(0,0,0,.45); border-radius:8px; padding:5px 8px; }

  /* Gradient fade at bottom */
  .mimi-fade-bottom { position:absolute; bottom:0; left:0; right:0; height:90px; background:linear-gradient(to top, rgba(0,0,0,.75), transparent); pointer-events:none; }
  .mimi-fade-top { position:absolute; top:0; left:0; right:0; height:55px; background:linear-gradient(to bottom, rgba(0,0,0,.4), transparent); pointer-events:none; }
  .post-loc { display:flex; align-items:center; gap:5px; padding:0 14px 10px; font-size:12.5px; color:var(--accent); font-weight:600; }
  .post-actions { display:flex; align-items:center; padding:6px 8px 2px; }
  .act-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:5px; padding:8px 10px; font-size:13px; font-weight:600; border-radius:10px; color:var(--sub); }
  .act-btn.liked { color:var(--pink); }
  .act-btn.saved { color:var(--accent); }

// Comprime uma imagem (canvas + JPEG) para caber com folga no limite de ~1MB
// por documento do Firestore. Sem isso, fotos de câmera (várias MB em base64)
// eram salvas só localmente e "desapareciam" ao recarregar, pois a escrita
// no Firestore falhava silenciosamente por excesso de tamanho.
function compressImageToDataUrl(file, maxDim, startQuality) {
  maxDim = maxDim || 1280;
  startQuality = startQuality || 0.75;
  return new Promise(function(resolve, reject) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function() {
      URL.revokeObjectURL(url);
      var w = img.width, h = img.height;
      var scale = Math.min(1, maxDim / Math.max(w, h));
      var cw = Math.max(1, Math.round(w * scale));
      var ch = Math.max(1, Math.round(h * scale));
      var canvas = document.createElement("canvas");
      canvas.width = cw; canvas.height = ch;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, cw, ch);
      var quality = startQuality;
      var dataUrl = canvas.toDataURL("image/jpeg", quality);
      var tries = 0;
      while (dataUrl.length > 900000 && tries < 6) {
        quality = Math.max(0.35, quality - 0.12);
        dataUrl = canvas.toDataURL("image/jpeg", quality);
        tries++;
      }
      resolve(dataUrl);
    };
    img.onerror = function() { URL.revokeObjectURL(url); reject(new Error("img-load-failed")); };
    img.src = url;
  });
}

function showNotifBanner(name, avatar, text) {
  var existing = document.querySelector(".notif-banner");
  if (existing) existing.remove();
  var b = document.createElement("div");
  b.className = "notif-banner";
  b.innerHTML =
    '<img src="' + avatar + '" class="notif-banner-avatar" onerror="this.src=\'https://api.dicebear.com/7.x/avataaars/svg?seed=x\'">' +
    '<div class="notif-banner-text"><span class="notif-banner-name">' + name + '</span> <span class="notif-banner-msg">' + text + '</span></div>' +
    '<button class="notif-banner-close">&#x2715;</button>';
  document.body.appendChild(b);
  b.querySelector(".notif-banner-close").addEventListener("click", function() { b.remove(); });
  b.addEventListener("click", function(e) {
    if (!e.target.classList.contains("notif-banner-close")) {
      b.remove();
      if (state && state.user) { state.page = "notifs"; render(); }
    }
  });
  setTimeout(function() { if (b.parentNode) b.remove(); }, 4000);
}

// ── helpers Firestore ─────────────────────────────────────────
function fsValue(val) {
  if (val === null || val === undefined) return { nullValue: null };
  if (typeof val === "boolean")  return { booleanValue: val };
  if (typeof val === "number")   return Number.isInteger(val) ? { integerValue: String(val) } : { doubleValue: val };
  if (typeof val === "string")   return { stringValue: val };
  if (Array.isArray(val))        return { arrayValue: { values: val.map(fsValue) } };
  if (typeof val === "object")   return { mapValue: { fields: fsObj(val) } };
  return { stringValue: String(val) };
}
function fsObj(obj) {
  var fields = {};
  Object.keys(obj).forEach(function(k) { fields[k] = fsValue(obj[k]); });
  return fields;
}
function fsRead(val) {
  if (!val) return null;
  if ("nullValue"    in val) return null;
  if ("booleanValue" in val) return val.booleanValue;
  if ("integerValue" in val) return parseInt(val.integerValue, 10);
  if ("doubleValue"  in val) return val.doubleValue;
  if ("stringValue"  in val) return val.stringValue;
  if ("arrayValue"   in val) return (val.arrayValue.values||[]).map(fsRead);
  if ("mapValue"     in val) {
    var out = {};
    var f = val.mapValue.fields || {};
    Object.keys(f).forEach(function(k){ out[k] = fsRead(f[k]); });
    return out;
  }
  return null;
}
function fsDocToObj(doc) {
  var out = {};
  var fields = doc.fields || {};
  Object.keys(fields).forEach(function(k){ out[k] = fsRead(fields[k]); });
  // extrai o id do nome do documento
  var nameParts = (doc.name||"").split("/");
  out._id = nameParts[nameParts.length-1];
  return out;
}

function fsGet(path) {
  return fetch(FIRE_DB+"/"+path, { headers: authHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(d){ return d.fields ? fsDocToObj(d) : null; });
}
function fsList(collection) {
  return fetch(FIRE_DB+"/"+collection+"?pageSize=200", { headers: authHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.documents) return [];
      return d.documents.map(fsDocToObj);
    });
}
function fsQuery(collection, field, op, value) {
  // Usa runQuery para filtrar no servidor (suporta array-contains, ==, etc)
  var url = FIRE_DB+":runQuery";
  var body = {
    structuredQuery: {
      from: [{ collectionId: collection }],
      where: {
        fieldFilter: {
          field: { fieldPath: field },
          op: op,
          value: fsValue(value)
        }
      }
    }
  };
  return fetch(url, { method:"POST", headers: authHeaders(), body: JSON.stringify(body) })
    .then(function(r){ return r.json(); })
    .then(function(arr){
      if (!Array.isArray(arr)) return [];
      return arr.filter(function(x){ return x.document; }).map(function(x){ return fsDocToObj(x.document); });
    });
}
function fsSet(path, data, merge) {
  var url = FIRE_DB+"/"+path;
  // Se merge=true, usa updateMask para não apagar outros campos
  if (merge !== false) {
    var keys = Object.keys(data);
    if (keys.length > 0) {
      url += "?" + keys.map(function(k){ return "updateMask.fieldPaths="+encodeURIComponent(k); }).join("&");
    }
  }
  return fetch(url, {
    method:"PATCH", headers: authHeaders(),
    body: JSON.stringify({ fields: fsObj(data) })
  }).then(function(r){ return r.json(); });
}
function fsAdd(collection, data) {
  return fetch(FIRE_DB+"/"+collection, {
    method:"POST", headers: authHeaders(),
    body: JSON.stringify({ fields: fsObj(data) })
  }).then(function(r){ return r.json(); });
}
function fsDelete(path) {
  return fetch(FIRE_DB+"/"+path, { method:"DELETE", headers: authHeaders() });
}

  // ── STORIES ───────────────────────────────────────────────
  // Um único documento do Firestore tem limite de ~1MB. Para vídeos (que

  // coleção "storyChunks" e remontamos na leitura — assim conseguimos
  // vídeos maiores sem precisar do Cloud Storage (que exige plano pago).
  STORY_CHUNK_SIZE: 900000,

  createStory: function(item) {
    if (!_idToken) return Promise.resolve();
    var now = new Date().toISOString();
    var src = item.src || "";
    var self = this;

    if (src.length > self.STORY_CHUNK_SIZE) {
      var chunks = [];
      for (var i = 0; i < src.length; i += self.STORY_CHUNK_SIZE) {
        chunks.push(src.slice(i, i + self.STORY_CHUNK_SIZE));
      }
      var chunkedData = {
        authorId:  ME_ID,
        type:      item.type || "image",
        src:       null,
        chunked:   true,
        chunkCount: chunks.length,
        likes:     [],
        comments:  [],
        createdAt: now,
      };
      return fsAdd("stories", chunkedData).then(function(doc){
        if (doc && doc.error) { console.error("createStory error:", doc.error); return Promise.reject(doc.error); }
        var id = (doc.name||"").split("/").pop();
        item.id        = id;
        item._fromFs   = true;
        item.createdAt = now;
        return Promise.all(chunks.map(function(chunk, idx){
          return fsAdd("storyChunks", { storyId:id, index:idx, data:chunk });
        })).then(function(){ return id; });
      });
    }

    var data = {
      authorId:  ME_ID,
      type:      item.type || "image",
      src:       src,
      likes:     [],
      comments:  [],
      createdAt: now,
    };
    return fsAdd("stories", data).then(function(doc){
      if (doc && doc.error) {
        console.error("createStory error:", doc.error);
        return Promise.reject(doc.error);
      }
      var id = (doc.name||"").split("/").pop();
      item.id        = id;
      item._fromFs   = true;
      item.createdAt = now;
      return id;
    });
  },

  // Carrega todos os stories ainda válidos (últimas 24h) do Firestore,
  // remontando vídeos em partes (chunked) e aproveitando pra apagar do
  // Firestore os stories já expirados (evita acumular custo/espaço de graça).
  // Busca as partes de cada vídeo com uma query filtrada por storyId (não
  // lista a coleção "storyChunks" inteira) — assim continua funcionando
  // mesmo com muitos vídeos acumulados, sem cair no limite de página.
  loadStories: function() {
    if (!_idToken) return Promise.resolve();
    return fsList("stories").then(function(docs){
      if (!docs || !docs.length) return; // mantém stories locais/demo se vazio
      var cutoff = Date.now() - 24*60*60*1000;
      var valid = [], expired = [];
      docs.forEach(function(d){
        var t = d.createdAt ? new Date(d.createdAt).getTime() : NaN;
        (isNaN(t) || t < cutoff) ? expired.push(d) : valid.push(d);
      });

      // limpa stories expirados (documento + partes), sem travar o carregamento
      expired.forEach(function(d){
        fsDelete("stories/" + d._id).catch(function(){});
        if (d.chunked) {
          fsQuery("storyChunks","storyId","EQUAL",d._id).then(function(chunks){
            (chunks||[]).forEach(function(c){ fsDelete("storyChunks/"+c._id).catch(function(){}); });
          }).catch(function(){});
        }
      });

      // para os válidos, busca e remonta as partes de vídeo quando necessário
      return Promise.all(valid.map(function(d){
        if (!d.chunked) return d;
        return fsQuery("storyChunks","storyId","EQUAL",d._id).then(function(chunks){
          chunks = (chunks||[]).sort(function(a,b){ return (a.index||0)-(b.index||0); });
          d.src = chunks.map(function(c){ return c.data || ""; }).join("");
          return d;
        }).catch(function(){ d.src = null; return d; });
      })).then(function(fullDocs){
        var byAuthor = {};
        fullDocs.forEach(function(d){
          if (!d.src) return; // partes ainda não sincronizadas / doc incompleto
          // FILTRO: Rejeitar contas suspeitas/fakes
          var authorUser = USERS[d.authorId];
          if (authorUser) {
            var isBot = (authorUser.name||"").toLowerCase().includes("bot") || 
                       (authorUser.name||"").toLowerCase().includes("fake") ||
                       (authorUser.username||"").toLowerCase().includes("bot") ||
                       (authorUser.username||"").toLowerCase().includes("fake") ||
                       (authorUser.followers && authorUser.followers.length === 0 && authorUser.following && authorUser.following.length === 0);
            if (isBot) return;
          }
          if (!byAuthor[d.authorId]) byAuthor[d.authorId] = [];
          byAuthor[d.authorId].push({
            id: d._id, _fromFs:true, type: d.type || "image", src: d.src,
            time: _relTime(d.createdAt), createdAt: d.createdAt,
            likes: d.likes || [], comments: d.comments || [],
          });
        });
        Object.keys(byAuthor).forEach(function(authorId){
          var items = byAuthor[authorId];
          items.sort(function(a,b){ return (a.createdAt||"").localeCompare(b.createdAt||""); });
          var entry = STORIES.find(function(s){ return s.ownerId === authorId; });
          if (!entry) {
            entry = { ownerId: authorId, seenCount: 0, items: [] };
            STORIES.push(entry);
          }
          entry.items = items;
          if (authorId === ME_ID) entry.seenCount = items.length; // já vi os meus
        });
      });
    }).catch(function(err){
      console.error("loadStories error:", err);
    });
  },

  // Remove um story do Firestore, incluindo as partes (chunks) de vídeo
  deleteStory: function(itemId) {
    if (!_idToken || !itemId) return Promise.resolve();
    return fsQuery("storyChunks","storyId","EQUAL",itemId).then(function(chunks){
      return Promise.all((chunks||[]).map(function(c){ return fsDelete("storyChunks/"+c._id).catch(function(){}); }));
    }).catch(function(){}).then(function(){
      return fsDelete("stories/" + itemId).catch(function(){});
    });
  },

  // ── MENSAGENS ─────────────────────────────────────────────
  // Salva em "convos/{convoId}/messages/{id}" — o MESMO caminho que
  // loadMessages() lê. Fotos/vídeos em base64 podem passar de 1MB (limite
  // de um documento do Firestore), então, assim como os stories, se o
  // conteúdo for grande ele é dividido em pedaços na coleção "msgChunks" e
  // remontado na leitura.
  MSG_CHUNK_SIZE: 900000,

  sendMessage: function(convoId, msgData) {
    if (!_idToken) return Promise.resolve(null);
    var self = this;
    var id = msgData.id || uid();
    var content = msgData.content || msgData.img || msgData.audio || msgData.text || "";
    var base = {
      senderId:  msgData.senderId || ME_ID,
      type:      msgData.type || "text",
      createdAt: msgData.createdAt || new Date().toISOString(),
    };

    if (content && content.length > self.MSG_CHUNK_SIZE) {
      var chunks = [];
      for (var i = 0; i < content.length; i += self.MSG_CHUNK_SIZE) {
        chunks.push(content.slice(i, i + self.MSG_CHUNK_SIZE));
      }
      base.content = null;
      base.chunked = true;
      base.chunkCount = chunks.length;
      return fsSet("convos/"+convoId+"/messages/"+id, base, false).then(function(doc){
        return Promise.all(chunks.map(function(chunk, idx){
          return fsAdd("msgChunks", { msgId:id, index:idx, data:chunk });
        })).then(function(){ return doc; });
      });
    }

    base.content = content || null;
    return fsSet("convos/"+convoId+"/messages/"+id, base, false);
  },

  // Carrega conversas reais do utilizador do Firestore
  loadConvos: function() {
    if (!_idToken || !_fbUid) return Promise.resolve();
    var myId = ME_ID;
    // Limpa conversas demo (ids c1–c4) antes de carregar as reais
    CONVOS.length = 0;
    return fsList("convos").then(function(docs) {
      docs.forEach(function(doc) {
        var members = doc.members || [];
        if (members.indexOf(myId) === -1 && members.indexOf(_fbUid) === -1) return;
        var otherId = members.find(function(m){ return m !== myId && m !== _fbUid; });
        if (!otherId) return;
        if (CONVOS.find(function(c){ return c.id === doc._id; })) return;
        CONVOS.unshift({
          id: doc._id, userId: otherId,
          last: doc.lastMsg || "", time: "antes",
          unread: 0, online: false,

          fsGet("users/"+otherId).then(function(u) {

  loadMessages: function(convoId) {
    return fsList("convos/"+convoId+"/messages").then(function(msgs) {
      var full = msgs.map(function(m){
        if (!m.chunked) return Promise.resolve(m);
        return fsQuery("msgChunks","msgId","EQUAL",m._id).then(function(chunks){
          chunks = (chunks||[]).sort(function(a,b){ return (a.index||0)-(b.index||0); });
          m.content = chunks.map(function(c){ return c.data || ""; }).join("");
          return m;
        }).catch(function(){ m.content = null; return m; });
      });
      return Promise.all(full).then(function(all){
        all = all.filter(function(m){ return !m.chunked || m.content; }); // ignora chunks ainda incompletos
        all.sort(function(a, b) {
          return (a.createdAt || "").localeCompare(b.createdAt || "");
        });
        return all;
      });
    });
  },

  // ── BUSCA DE UTILIZADORES por username ────────────────────
  searchUsers: function(query) {
    if (!query || query.length < 2) return Promise.resolve([]);
    var q = query.toLowerCase().replace(/^@/,"");

    var url = FIRE_DB + "/users";
    return fetch(url, { headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        showToast("Erro na busca: " + data.error.message);
        return [];
      }
      var docs = data.documents || [];
      var results = [];
      docs.forEach(function(doc) {
        var u = fsDocToObj(doc);
        var id = u._id;
        if (id === ME_ID) return;
        var name  = (u.name  || "").toLowerCase();
        var uname = (u.username || "").toLowerCase().replace(/^@/,"");
        if (uname.indexOf(q) !== -1 || name.indexOf(q) !== -1) {
          delete u._id;
          u.uid = id;
          USERS[id] = USERS[id] || u;
          results.push(u);
        }
      });
      return results.slice(0, 15);
    })
    .catch(function() {
      showToast("Falha na busca. Verifica a internet.");
      return [];
    });
  },

  // ── CONVERSA entre dois utilizadores ─────────────────────
  getOrCreateConvo: function(otherUid) {
    // ID da conversa é sempre os dois UIDs ordenados alfabeticamente
    var ids = [ME_ID, otherUid].sort();
    var convoId = ids[0] + "_" + ids[1];

    // carrega ou cria o documento da conversa
    return fsGet("convos/"+convoId).then(function(doc) {
      if (!doc) {
        return fsSet("convos/"+convoId, {
          members: [ME_ID, otherUid],
          lastMsg: "",
          lastTime: new Date().toISOString(),
        }).then(function() { return convoId; });
      }
      return convoId;
    }).then(function(cid) {
      // garante que está na lista local
      if (!CONVOS.find(function(c){ return c.id === cid; })) {
        var u = USERS[otherUid] || { name: otherUid, username: "", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed="+otherUid };
        CONVOS.unshift({ id: cid, userId: otherUid, last: "", time: "agora", unread: 0, online: false });
      }
      return cid;
    });
  },

  saveUserProfile: function(data) {
    if (!_idToken || !_fbUid) return Promise.resolve();
    return fsSet("users/"+_fbUid, data).then(function(){
      USERS[_fbUid] = data;
    });
  },

  // ── NOTIFICAÇÕES NO FIRESTORE ────────────────────────────────
  // Grava uma notificação para outro usuário no Firestore
  pushNotif: function(toUid, type, text) {
    if (!_idToken || !toUid || toUid === ME_ID) return;
    var data = {
      type:      type,
      fromUid:   ME_ID,
      fromName:  (USERS[ME_ID] ? USERS[ME_ID].name  : ""),
      fromAvatar:(USERS[ME_ID] ? USERS[ME_ID].avatar : ""),
      text:      text,
      read:      false,
      createdAt: new Date().toISOString(),
    };
    fsAdd("notifications/" + toUid + "/items", data).catch(function(){});
  },

  // Carrega notificações do Firestore para o usuário logado
  loadNotifs: function() {
    if (!_idToken || !_fbUid) return Promise.resolve([]);
    return fsList("notifications/" + _fbUid + "/items").then(function(docs) {
      return docs.sort(function(a,b){
        return (b.createdAt||"").localeCompare(a.createdAt||"");
      });
    }).catch(function(){ return []; });
  },

  // Marca todas as notificações do Firestore como lidas
  markNotifsRead: function(ids) {
    if (!_idToken || !_fbUid || !ids || !ids.length) return;
    ids.forEach(function(id) {
      fsSet("notifications/" + _fbUid + "/items/" + id, { read: true }).catch(function(){});
    });
  },

  // Atualizar curtidas em stories
  // OBS: os stories são salvos como documentos de topo na coleção "stories"
  // (o id do documento É o itemId — veja createStory/loadStories). O caminho
  // antigo ("stories/{ownerId}/items/{itemId}") apontava para um documento
  // que nunca existia de verdade, então a curtida nunca era persistida nem
  // sincronizada para outros usuários — corrigido para "stories/{itemId}".
  updateStoryLike: function(storyOwnerId, itemId, likes) {
    if (!_idToken || !_fbUid) return Promise.reject("Not authenticated");
    return fsSet("stories/" + itemId, {
      likes: likes,
      updatedAt: new Date().toISOString()
    });
  },

  // Adicionar comentário em story (também salvo como campo no doc do story,
  // não em subcoleção, já que o item vive em "stories/{itemId}")
  addStoryComment: function(storyOwnerId, itemId, comment, allComments) {
    if (!_idToken || !_fbUid) return Promise.reject("Not authenticated");
    return fsSet("stories/" + itemId, {
      comments: allComments
    });
  },

  // Busca quem visualizou um item de story (para o dono ver a contagem/lista)
  getStoryViewers: function(storyOwnerId, itemId) {
    if (!_idToken) return Promise.resolve([]);
    return fsList("storyViews/" + storyOwnerId + "/" + itemId).then(function(docs){
      return (docs||[]).map(function(d){ return { uid: d._id, viewedAt: d.viewedAt }; });
    }).catch(function(){ return []; });
  },

  // (a função de envio de mensagens do chat foi unificada — ver "sendMessage"
  // logo abaixo de "MENSAGENS". Havia uma segunda função "sendMessage" aqui
  // com o mesmo nome, e como o JavaScript deixa uma chave repetida sobrescrever
  // a anterior, era ESSA versão quebrada que rodava de verdade: ela gravava em
  // "chats/{convoId}/messages/{id}" enquanto o resto do app sempre leu as
  // mensagens de "convos/{convoId}/messages" — daí fotos, vídeos e até texto
  // pareciam "sumir" ao sair da conversa ou recarregar a página, e nunca
  // chegavam pro outro usuário.)

  // Adicionar comentário em post
  addComment: function(postId, comment) {
    if (!_idToken || !_fbUid) return Promise.reject("Not authenticated");
    return fsSet("posts/" + postId + "/comments/" + comment.id, {
      authorId: comment.authorId,
      text: comment.text,
      createdAt: comment.createdAt,
      parentId: comment.parentId
    });
  },

  // Incrementar contador de compartilhamentos
  incrementShareCount: function(postId) {
    if (!_idToken || !_fbUid) return Promise.reject("Not authenticated");
    return fsSet("posts/" + postId, { 
      _shares: (POSTS.find(function(p){ return p.id === postId; }) || {})._shares ? 
        (POSTS.find(function(p){ return p.id === postId; })._shares + 1) : 1
    });
  },

  // Registrar visualização de story
  // Antes, isso rodava de novo a cada re-render enquanto o story estava
  // aberto (troca de like em outro lugar, status online mudando, etc.), e
  // cada chamada criava uma notificação NOVA (id aleatório) pro dono — ou
  // seja, virava spam de "visualizou seu story" pra uma única visualização.
  // Agora: (1) um cache local evita repetir a chamada nesta sessão, e
  // (2) o id da notificação é determinístico (item + quem viu), então
  // mesmo que rode de novo, ela só sobrescreve o mesmo documento em vez de
  // criar um novo.
  _storyViewsSent: {},
  recordStoryView: function(storyOwnerId, itemId) {
    if (!_idToken || !_fbUid || _fbUid === storyOwnerId) return Promise.resolve();
    if (this._storyViewsSent[itemId]) return Promise.resolve();
    this._storyViewsSent[itemId] = true;

    var notifId = "storyView_" + itemId + "_" + _fbUid;
    return fsSet("storyViews/" + storyOwnerId + "/" + itemId + "/" + _fbUid, {
      viewedAt: new Date().toISOString()
    }).then(function() {
      // Notificar dono do story (documento com id fixo — não duplica)
      return fsSet("notifications/" + storyOwnerId + "/items/" + notifId, {
        type: "storyView",
        fromUid: _fbUid,
        fromName: (USERS[_fbUid] || {}).name || "Usuário",
        fromAvatar: (USERS[_fbUid] || {}).avatar || "",
        text: "visualizou seu story",
        storyOwnerId: storyOwnerId,
        createdAt: new Date().toISOString(),
        read: false
      });
    }).catch(function(err) {
      console.error("Erro ao registrar visualização:", err);
    });
  },

  // Registrar visualização de perfil
  recordProfileView: function(profileOwnerId) {
    if (!_idToken || !_fbUid || _fbUid === profileOwnerId) return Promise.resolve();
    
    return fsSet("notifications/" + profileOwnerId + "/items/" + uid(), {
      type: "profileView",
      fromUid: _fbUid,
      fromName: (USERS[_fbUid] || {}).name || "Usuário",
      fromAvatar: (USERS[_fbUid] || {}).avatar || "",
      text: "visitou seu perfil",
      createdAt: new Date().toISOString(),
      read: false
    }).catch(function(){});
  }
};

var _presenceInterval = null;

function startPresence() {
  if (!_idToken || !_fbUid) return;
  // Marca online agora
  fsSet("users/"+_fbUid, { online: true, lastSeen: new Date().toISOString() });
  // Atualiza a cada 30s
  clearInterval(_presenceInterval);
  _presenceInterval = setInterval(function() {
    if (!_idToken || !_fbUid) { clearInterval(_presenceInterval); return; }
    fsSet("users/"+_fbUid, { online: true, lastSeen: new Date().toISOString() });
  }, 30000);
  // Ao fechar/sair marca offline
  window.addEventListener("beforeunload", function() {
    fsSet("users/"+_fbUid, { online: false, lastSeen: new Date().toISOString() });
  });
}

function checkOnlineStatus(convos) {
  // Para cada conversa, verifica o status online do outro utilizador
  convos.forEach(function(conv) {
    if (!conv.userId) return;
    fsGet("users/"+conv.userId).then(function(u) {
      if (!u) return;
      var wasOnline = conv.online;
      // Online se lastSeen < 2 minutos atrás
      var online = false;
      if (u.online === true && u.lastSeen) {
        var diff = (Date.now() - new Date(u.lastSeen).getTime()) / 1000;
        online = diff < 120;
      }
      conv.online = online;
      if (wasOnline !== online) render();
    }).catch(function(){});
  });
}

// ── POLLING DE NOTIFICAÇÕES (a cada 12s) ─────────────────────
var _notifPollInterval = null;
var _lastNotifCheck = null; // ISO string da última checagem

function startNotifPolling() {
  stopNotifPolling();
  if (!_idToken || !_fbUid) return;
  _lastNotifCheck = new Date().toISOString();

  _notifPollInterval = setInterval(function() {
    if (!_idToken || !_fbUid) { stopNotifPolling(); return; }
    FB.loadNotifs().then(function(docs) {
      if (!docs || !docs.length) return;
      var changed = false;
      docs.forEach(function(doc) {
        // Evita duplicatas: checa pelo _id do Firestore
        var exists = NOTIFS.find(function(n){ return n._fsId === doc._id; });
        if (exists) return;
        // Só processa notificações após o login
        if (doc.createdAt && _lastNotifCheck && doc.createdAt < _lastNotifCheck) {
          // notif antiga — só adiciona à lista sem toast/badge animado
          NOTIFS.push({
            id:       uid(),
            _fsId:    doc._id,
            type:     doc.type     || "like",
            userId:   doc.fromUid  || "",
            _fromName:doc.fromName || "",
            _fromAvatar: doc.fromAvatar || "",
            text:     doc.text     || "",
            time:     doc.createdAt ? _relTime(doc.createdAt) : "antes",
            read:     !!doc.read,
          });
          changed = true;
          return;
        }
        // notif nova — adiciona e dispara alerta
        var n = {
          id:        uid(),
          _fsId:     doc._id,
          type:      doc.type     || "like",
          userId:    doc.fromUid  || "",
          _fromName: doc.fromName || "",
          _fromAvatar: doc.fromAvatar || "",
          text:      doc.text     || "",
          time:      doc.createdAt ? _relTime(doc.createdAt) : "agora",
          createdAt: doc.createdAt,
          read:      false,
        };
        NOTIFS.unshift(n);
        changed = true;

        // Preenche USERS se não tiver
        if (doc.fromUid && !USERS[doc.fromUid] && doc.fromName) {
          USERS[doc.fromUid] = {
            uid:      doc.fromUid,
            name:     doc.fromName,
            username: "@" + doc.fromName.toLowerCase().replace(/\s+/g,""),
            avatar:   doc.fromAvatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+doc.fromUid,
            verified: false, followers:[], following:[],
          };
        }

        // Toast + badge
        showNotifBanner(doc.fromName||"Alguém", doc.fromAvatar||"https://api.dicebear.com/7.x/avataaars/svg?seed=x", doc.text||"");
        var badge = document.querySelector(".nav-btn[data-nav='notifs'] .nav-badge");
        var unread = NOTIFS.filter(function(x){ return !x.read; }).length;
        if (badge) {
          badge.textContent = unread;
        } else {
          var navBtn = document.querySelector(".nav-btn[data-nav='notifs']");
          if (navBtn) {
            var b = document.createElement("div");
            b.className = "nav-badge";
            b.textContent = unread;
            navBtn.appendChild(b);
          }
        }
      });
      _lastNotifCheck = new Date().toISOString();
      if (changed && state.page === "notifs") render();
    }).catch(function(){});
  }, 12000);
}

function stopNotifPolling() {
  if (_notifPollInterval) { clearInterval(_notifPollInterval); _notifPollInterval = null; }
}

// ── POLLING DE STORIES (a cada 15s) ──────────────────────────
// Antes, loadStories() só era chamado uma vez, no login. Isso significa que
// um story novo publicado por outra pessoa só aparecia se a página fosse
// totalmente recarregada — daí a sensação de "atraso" (na prática, nunca
// atualizava sozinho). Com o polling, a lista de stories se atualiza sozinha.
var _storyPollInterval = null;
function startStoryPolling() {
  stopStoryPolling();
  if (!_idToken || !_fbUid) return;
  _storyPollInterval = setInterval(function() {
    if (!_idToken || !_fbUid) { stopStoryPolling(); return; }
    FB.loadStories().then(function(){ render(); }).catch(function(){});
  }, 8000);
}
function stopStoryPolling() {
  if (_storyPollInterval) { clearInterval(_storyPollInterval); _storyPollInterval = null; }
}

function _relTime(iso) {
  try {
    var diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 60)  return diff + "s";
    if (diff < 3600) return Math.floor(diff/60) + "m";
    if (diff < 86400) return Math.floor(diff/3600) + "h";
    return Math.floor(diff/86400) + "d";
  } catch(e) { return "antes"; }
}

// ── POLLING de mensagens em tempo real (a cada 5s) ────────────
var _pollInterval = null;
var _lastMsgCount = 0;
var _editingBioField = false;  // FIX: Flag para evitar render enquanto edita bio
var _editingPostField = false; // FIX: Flag para evitar render enquanto digita publicação
var _cachedAudioStream = null;  // FIX: Cache stream de áudio para não pedir permissão repetida
var _audioPermissionGranted = false;  // FIX: Flag para rastrear se permissão foi concedida

function loadChatMessagesNow() {
  if (!state.activeConvoId || !_idToken) return;
  if (_editingBioField) return;  // FIX: Não renderizar enquanto edita bio
  
  // FIX: Adicionar timeout de 8s para evitar requests bloqueantes acumularem
  var loadPromise = FB.loadMessages(state.activeConvoId);
  var timeoutPromise = new Promise(function(_, reject) {
    setTimeout(function() { reject(new Error("Timeout 8s")); }, 8000);
  });
  
  Promise.race([loadPromise, timeoutPromise]).then(function(msgs) {
    if (!msgs || msgs.length === 0) return;
    var chat = chatHistories[state.activeConvoId];
    if (!chat) { chatHistories[state.activeConvoId] = []; chat = chatHistories[state.activeConvoId]; }
    var changed = false;
    msgs.forEach(function(m) {
      try {
        var existing = chat.find(function(c){ return c._firestoreId === m._id; });
        if (!existing && m._id) {  // FIX: Garantir que _id existe
          var isMe = m.senderId === ME_ID;
          var createdAt = m.createdAt || new Date().toISOString();
          var msgType = m.type || "text";
          var msgText = null;
          var msgSrc = null;
          
          // FIX: Mapear corretamente, tolerando valores vazios
          if (msgType === "text") {
            msgText = m.content || m.text || "";
            if (!msgText) return;  // Skip se vazio
          } else if (msgType === "image") {
            msgSrc = m.content || m.img || m.image || m.src || "";
            if (!msgSrc) return;  // Skip se vazio
          } else if (msgType === "video") {
            msgSrc = m.content || m.video || m.src || "";
            if (!msgSrc) return;  // Skip se vazio
          } else if (msgType === "audio") {
            msgSrc = m.content || m.audio || m.src || "";
            if (!msgSrc) return;  // Skip se vazio
          }
          
          var msgObj = {
            id: m._id, _firestoreId: m._id,
            me: isMe, type: msgType,
            text: msgText,
            src: msgSrc,
            createdAt: createdAt,
            time: new Date(createdAt).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
          };
          chat.push(msgObj);
          changed = true;
        }
      } catch (e) {
        console.error("Erro ao processar mensagem:", m, e);
      }
    });
    if (changed) {
      var lastMsg = msgs[msgs.length-1];
      var conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
      if (conv && lastMsg) {
        if (lastMsg.type === "text") {
          conv.last = lastMsg.content || lastMsg.text || "Mensagem";
        } else if (lastMsg.type === "image") {
          conv.last = "📷 Foto";
        } else if (lastMsg.type === "video") {
          conv.last = "🎥 Vídeo";
        } else if (lastMsg.type === "audio") {
          conv.last = "🎤 Áudio";
        }
        var lastCreatedAt = lastMsg.createdAt || new Date().toISOString();
        conv.time = _relTime(lastCreatedAt);
      }
      if (state.page === "chat") render();
      scrollChatToBottom();
    }
  }).catch(function(err){
    console.error("Erro ao carregar mensagens:", err);
    // Tentar novamente em 5s
    setTimeout(loadChatMessagesNow, 5000);
  });
}

function startChatPolling() {
  stopChatPolling();
  if (!state.activeConvoId || !_idToken) return;
  
  // Carregar imediatamente ao entrar no chat
  loadChatMessagesNow();
  
  // FIX: Polling a cada 5s (ao invés de 1.5s) para reduzir carga da UI
  // e evitar acúmulo de requests bloqueantes
  _pollInterval = setInterval(function() {
    if (!state.activeConvoId || !_idToken) { stopChatPolling(); return; }
    try {
      checkOnlineStatus(CONVOS);
      loadChatMessagesNow();
    } catch (e) {
      console.error("Erro no polling:", e);
    }
  }, 500);  // 0.5s para carregamento rápido
}

function stopChatPolling() {
  if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
}

// Aguardar que appEl esteja pronto antes de usar
function getAppEl() {
  if (!window.appEl) {
    window.appEl = document.getElementById("app");
  }
  return window.appEl || document.getElementById("app");
}

var appEl = null;

function fallbackCopyToClipboard(text) {
  var input = document.createElement("input");
  input.type = "text";
  input.value = text;
  input.style.position = "fixed";
  input.style.opacity = "0";
  document.body.appendChild(input);
  input.select();
  try {
    document.execCommand("copy");
    showToast("Link copiado! 🔗");
  } catch(err) {
    showToast("Erro ao copiar. Tente novamente.");
  }
  document.body.removeChild(input);
}

function render() {
  appEl = getAppEl();
  if (!appEl) {
    console.error("❌ Elemento #app não encontrado no DOM");
    setTimeout(render, 500); // Tentar novamente em 500ms
    return;
  }
  // FIX: Não renderizar enquanto usuário está editando bio (isso mantém o foco no input)
  if (_editingBioField && state.editProfileOpen) {
    console.log("⏭️ Render skipped (bio field being edited)");
    return;
  }
  // FIX: Não renderizar enquanto usuário está digitando publicação (isso mantém o foco no input)
  if (_editingPostField) {
    console.log("⏭️ Render skipped (post field being edited)");
    return;
  }
  if (!state.user) {
    appEl.innerHTML = renderAuthPage();
    bindAuthPage();
    return;
  }
  meRefresh();

  var unreadNotifs = NOTIFS.filter(function(n){ return !n.read; }).length;
  var unreadMsgs = CONVOS.reduce(function(a,c){ return a + c.unread; }, 0);

  var pageHtml = "";
  var showBottomNav = true;

  if (state.postDetailId) {
    pageHtml = renderPostDetailPage();
    showBottomNav = false;
  } else if (state.viewProfileId) {
    pageHtml = renderProfilePage(state.viewProfileId);
    showBottomNav = false;
  } else if (state.page === "feed") pageHtml = renderFeedPage();
  else if (state.page === "explore") pageHtml = renderExplorePage();
  else if (state.page === "notifs") pageHtml = renderNotifsPage();
  else if (state.page === "msgs") pageHtml = renderMsgsPage();
  else if (state.page === "profile") pageHtml = renderProfilePage(ME_ID);
  else if (state.page === "settings") pageHtml = renderSettingsPage();

  var html = '<div style="padding-bottom:'+(showBottomNav?72:0)+'px;">' + pageHtml + '</div>';
  if (showBottomNav) html += renderBottomNav(unreadNotifs, unreadMsgs);

  if (state.followListFor) html += renderFollowListPage();
  if (state.creating) html += renderCreatePost();
  if (state.editProfileOpen) html += renderEditProfile();
  if (state.subsOpen) html += renderSubsPage();
  if (state.viewingStoryIdx !== null) html += renderStoryViewer();
  if (activeCall) html += renderCallScreen();
  if (state.actionSheetPostId) html += renderActionSheet();
  if (state.confirmDialog) html += renderConfirmDialog();

  appEl.innerHTML = html;
  bindGlobalHandlers();

  if (state.postDetailId) bindPostDetailPage();
  else if (state.viewProfileId) bindProfilePage(state.viewProfileId);
  else if (state.page === "feed") bindFeedPage();
  else if (state.page === "explore") bindExplorePage();
  else if (state.page === "notifs") bindNotifsPage();
  else if (state.page === "msgs") bindMsgsPage();
  else if (state.page === "profile") bindProfilePage(ME_ID);
  else if (state.page === "settings") bindSettingsPage();

  if (state.followListFor) bindFollowListPage();
  if (state.creating) bindCreatePost();
  if (state.editProfileOpen) bindEditProfile();
  if (state.subsOpen) bindSubsPage();
  if (state.viewingStoryIdx !== null) bindStoryViewer();
  if (activeCall) bindCallScreen();
  if (state.actionSheetPostId) bindActionSheet();
  if (state.confirmDialog) bindConfirmDialog();
}

function openProfile(userId) {
  state.viewProfileId = userId;
  state.followListFor = null;
  window.scrollTo(0,0);
  
  // Registrar visualização de perfil (se não for do próprio usuário)
  if (userId !== ME_ID) {
    FB.recordProfileView(userId).catch(function(){});
  }
  
  render();
}
function closeProfile() {
  state.viewProfileId = null;
  render();
}
function openPostDetail(pid) {
  state.postDetailId = pid;
  window.scrollTo(0,0);
  render();
}
function closePostDetail() {

  render();
}

// ─── BOTTOM NAV ──────────────────────────────────────────────

// ─── STORIES ─────────────────────────────────────────────────
function allStoriesList() {
  // owners with at least 1 item; "me" first
  var mine = myStoryEntry();
  var list = [];
  list.push({ ownerId:ME_ID, own:true, empty: mine.items.length === 0 });
  STORIES.forEach(function(s) {
    if (s.ownerId === ME_ID) return; // already added above
    if (!s.items.length) return;
    // FIX: Filtrar contas demo/fakes (IDs como u998, u997, u996, u995, u994, etc)
    if (/^u\d+$/.test(s.ownerId)) {
      console.log("⏭️ Pulando conta demo:", s.ownerId);
      return;  // Pular contas demo
    }
    list.push({ ownerId:s.ownerId, own:false, seenCount:s.seenCount });
  });
  return list;
}

function renderStories() {
  var list = allStoriesList();
  var html = '<div class="stories-wrap">';
  list.forEach(function(s, idx) {
    var u = USERS[s.ownerId];
    var entry = STORIES.find(function(x){ return x.ownerId === s.ownerId; });
    var totalItems = entry ? entry.items.length : 0;
    var fullySeen = entry ? entry.seenCount >= totalItems && totalItems > 0 : false;
    html += '<div class="story" data-story-ring="'+idx+'">' +
      '<div class="story-ring '+(fullySeen?"":"unseen")+'">' +
        '<div class="story-ring-inner">'+avatarHtml(u.avatar, 56)+'</div>' +
      '</div>';
    if (s.own) {
      html += '<div class="story-plus" data-add-story>'+icoSvg("plus",12,"#fff")+'</div>';
    }
    html += '<span class="story-name '+(fullySeen?"seen":"")+'">'+esc(s.own?"Você":u.name)+'</span></div>';
  });
  html += '</div>' +
    '<input type="file" id="story-file-input" accept="image/*,video/*" class="hidden">';
  return html;
}

function bindStoriesEvents() {
  var fileInput = appEl.querySelector("#story-file-input");
  appEl.querySelectorAll("[data-add-story]").forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      if (fileInput) fileInput.click();
    });
  });
  appEl.querySelectorAll("[data-story-ring]").forEach(function(ring) {
    ring.addEventListener("click", function(e) {
      if (e.target.closest("[data-add-story]")) return;
      var idx = parseInt(ring.getAttribute("data-story-ring"), 10);
      var list = allStoriesList();
      var entry = list[idx];
      if (entry.empty) {
        if (fileInput) fileInput.click();
        return;
      }
      state.viewingStoryIdx = idx;
      state.viewingStoryItemIdx = 0;
      render();
    });
  });
  if (fileInput) {
    fileInput.addEventListener("change", function() {
      var file = fileInput.files[0];
      if (!file) return;
      var isVideo = file.type.indexOf("video") === 0;
      if (isVideo) {
        // Vídeo grande demais é dividido automaticamente em várias partes no
        // Firestore (sem custo), então o limite aqui é só pra evitar vídeos
        // longos demais e proteger a cota gratuita de escritas por dia.
        var VIDEO_MAX_BYTES = 20 * 1024 * 1024;
        if (file.size > VIDEO_MAX_BYTES) {
          showToast("⚠️ Vídeo muito grande (máx. ~20MB, uns 30s). Grave mais curto ou em qualidade menor.");
          fileInput.value = "";
          return;
        }
        var reader = new FileReader();
        reader.onload = function() { publishStoryItem("video", reader.result); };
        reader.readAsDataURL(file);
      } else {
        compressImageToDataUrl(file, 1280, 0.75).then(function(dataUrl) {
          publishStoryItem("image", dataUrl);
        }).catch(function() {
          showToast("⚠️ Não foi possível processar essa imagem.");
        });
      }
      fileInput.value = "";
    });
  }
}

// Cria o item de story localmente (feedback instantâneo) e depois persiste
// no Firestore. Se o conteúdo ainda for grande demais, avisa claramente em
// vez de deixar o story desaparecer silenciosamente na próxima recarga.
function publishStoryItem(type, src) {
  var mine = myStoryEntry();
  var createdAt = new Date().toISOString();
  var newItem = { id:uid(), type:type, src:src, createdAt:createdAt, time:_relTime(createdAt), likes:[], comments:[] };
  mine.items.push(newItem);
  mine.seenCount = mine.items.length;
  showToast("Story publicado! 🎀 ("+mine.items.length+" hoje)");
  render();
  if (typeof FB !== "undefined" && FB.createStory) {
    var maxSize = newItem.type === "video" ? 20000000 : 5000000;
    var actualSize = newItem.src ? newItem.src.length : 0;
    if (actualSize > maxSize) {
      showToast("⚠️ Arquivo muito grande. Comprimir antes de publicar.");
      mine.items.pop();
      render();
    } else {
      FB.createStory(newItem).catch(function() {
        showToast("⚠️ Story salvo só neste dispositivo (falha ao sincronizar).");
      });
    }
  }
}

// ─── STORY VIEWER ────────────────────────────────────────────
var storyViewerTimer = null;
function currentStoryOwnerEntry() {
  var list = allStoriesList();
  var entryMeta = list[state.viewingStoryIdx];
  if (!entryMeta) return null;
  var entry = STORIES.find(function(x){ return x.ownerId === entryMeta.ownerId; });
  return entry || null;
}

function renderStoryViewer() {
  var entry = currentStoryOwnerEntry();
  if (!entry || !entry.items.length) { return ""; }
  var u = USERS[entry.ownerId];
  var itemIdx = Math.min(state.viewingStoryItemIdx, entry.items.length-1);
  var item = entry.items[itemIdx];
  var isOwn = entry.ownerId === ME_ID;

  // Registrar visualização de story (se não for do próprio usuário)
  if (!isOwn) {
    FB.recordStoryView(entry.ownerId, item.id).catch(function(){});
  } else if (typeof FB !== "undefined" && FB.getStoryViewers && !(item.id in state.storyViewsCache)) {
    // Busca quem viu esse story (só precisa acontecer uma vez por item —
    // o resultado fica em cache e a contagem de visualizações aparece no
    // botão do olho assim que a resposta chegar).
    state.storyViewsCache[item.id] = null; // marca como "carregando" pra não disparar de novo
    FB.getStoryViewers(entry.ownerId, item.id).then(function(viewers){
      state.storyViewsCache[item.id] = viewers || [];
      render();
    }).catch(function(){
      state.storyViewsCache[item.id] = [];
      render();
    });
  }

  // IMPORTANTE: o atributo "muted" é obrigatório aqui. Sem ele, a política de
  // autoplay dos navegadores (principalmente em celular) bloqueia o play()
  // silenciosamente — o vídeo nunca começa a rodar e fica parado no primeiro
  // frame, o que faz parecer que é uma foto estática para quem está vendo o
  // story de outra pessoa. O botão de som permite desmutar manualmente.
  var mediaHtml = item.type === "video"
    ? '<video src="'+item.src+'" autoplay playsinline muted data-story-media ' +
      'style="max-width:100%;max-height:100%;object-fit:contain;" ' +
      'onerror="console.error(\'Erro ao carregar video\')"></video>' +
      '<button class="icon-btn" data-story-mute-toggle style="position:absolute;bottom:78px;right:12px;color:#fff;background:rgba(0,0,0,.35);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;z-index:3;">'+icoSvg("micOff",18,"#fff")+'</button>'
    : '<img src="'+item.src+'" alt="" data-story-media ' +
      'style="max-width:100%;max-height:100%;object-fit:contain;" ' +
      'onerror="console.error(\'Erro ao carregar imagem\')">';

  var segments = "";
  entry.items.forEach(function(it, i) {
    var filled = i < itemIdx ? "100%" : (i === itemIdx ? "0%" : "0%");
    segments += '<div class="story-segment"><div class="story-segment-fill" data-seg-fill="'+i+'" style="width:'+filled+';"></div></div>';
  });

  var liked = item.likes.indexOf(ME_ID) !== -1;
  var viewers = state.storyViewsCache[item.id];
  var viewLabel = viewers == null ? "…" : String(viewers.length);
  var footer = isOwn
    ? '<div class="story-reply-row" style="justify-content:space-around;gap:0;">' +
        '<button class="story-action-btn" data-view-story-activity="views">' + icoSvg("eye",24,"#fff") +
          '<span class="story-action-count">'+viewLabel+' visualizações</span></button>' +
        '<button class="story-action-btn" data-view-story-activity="likes">' + icoSvg("heart",24,"#fff",item.likes.length>0) +
          '<span class="story-action-count">'+item.likes.length+' curtidas</span></button>' +
        '<button class="story-action-btn" data-delete-story>' + icoSvg("trash",24,"#fff") +
          '<span class="story-action-count">Apagar</span></button>' +
      '</div>'
    : '<div class="story-reply-row">' +
        '<input class="story-reply-input" placeholder="Responder…" data-story-reply-input>' +
        '<button class="story-action-btn" data-like-story>'+icoSvg("heart",24,liked?C.pink:"#fff",liked) +
          (item.likes.length ? '<span class="story-action-count">'+item.likes.length+'</span>' : '') + '</button>' +
        '<button class="story-action-btn" data-view-story-activity="comments">'+icoSvg("comment",24,"#fff")+'</button>' +
      '</div>';

  return '<div class="story-viewer fade-in">' +
    '<div class="story-segments">'+segments+'</div>' +
    '<div class="story-viewer-head" style="top:18px;">' +
      avatarHtml(u.avatar, 34) +
      '<span style="color:#fff;font-weight:700;font-size:13px;flex:1;">'+esc(isOwn?"Você":u.name)+' <span style="opacity:.7;font-weight:500;">· '+esc(item.time)+'</span></span>' +
      '<button class="icon-btn" data-close-story style="color:#fff;">'+icoSvg("close",22)+'</button>' +
    '</div>' +
    '<div class="story-viewer-media" data-story-tap>'+mediaHtml+'</div>' +
    footer +
  '</div>';
}

function bindStoryViewer() {
  var entry = currentStoryOwnerEntry();
  if (!entry) { state.viewingStoryIdx = null; return; }
  var itemIdx = Math.min(state.viewingStoryItemIdx, entry.items.length-1);
  var item = entry.items[itemIdx];
  var isOwn = entry.ownerId === ME_ID;

  var closeBtn = appEl.querySelector("[data-close-story]");
  if (closeBtn) closeBtn.addEventListener("click", closeStoryViewer);

  var tapArea = appEl.querySelector("[data-story-tap]");
  if (tapArea) tapArea.addEventListener("click", function(e) {
    // Antes isso ignorava o clique quando o alvo era o <video>, o que
    // impedia de avançar/voltar o story tocando na tela enquanto um vídeo
    // estava tocando. O botão de mudo já usa stopPropagation, então é
    // seguro deixar o toque no vídeo também navegar entre os stories.
    if (e.target.closest("[data-story-mute-toggle]")) return;
    var rect = tapArea.getBoundingClientRect();
    var x = e.clientX - rect.left;
    if (x < rect.width/2) goToPrevStoryItem(); else goToNextStoryItem();
  });

  var likeBtn = appEl.querySelector("[data-like-story]");
  if (likeBtn) likeBtn.addEventListener("click", function() {
    var idx = item.likes.indexOf(ME_ID);
    if (idx === -1) item.likes.push(ME_ID); else item.likes.splice(idx,1);
    pauseStoryTimer();
    render();
    
    // Sincronizar com Firebase
    if (typeof FB !== "undefined" && FB.updateStoryLike) {
      FB.updateStoryLike(entry.ownerId, item.id, item.likes).catch(function(err) {
        console.error("Erro ao salvar like:", err);
        showToast("Erro ao salvar curtida 😞");
      });
    }
  });

  var replyInput = appEl.querySelector("[data-story-reply-input]");
  if (replyInput) {
    replyInput.addEventListener("focus", pauseStoryTimer);
    replyInput.addEventListener("blur", resumeStoryTimerIfNeeded);
    replyInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && replyInput.value.trim()) {
        var createdAt = new Date().toISOString();
        var newComment = {
          id: uid(),
          authorId: ME_ID,
          text: replyInput.value.trim(),
          createdAt: createdAt,
          time: _relTime(createdAt)
        };
        item.comments.push(newComment);
        
        // Sincronizar com Firebase
        if (typeof FB !== "undefined" && FB.addStoryComment) {
          FB.addStoryComment(entry.ownerId, item.id, newComment, item.comments).catch(function(err) {
            console.error("Erro ao enviar comentário:", err);
            item.comments.pop();
            showToast("Erro ao enviar comentário 😞");
            render();
          });
        }
        
        showToast("Resposta enviada! 💬");
        replyInput.value = "";
        render();
      }
    });
  }

  appEl.querySelectorAll("[data-view-story-activity]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      pauseStoryTimer();
      openStoryComments(btn.getAttribute("data-view-story-activity"));
    });
  });

  var deleteBtn = appEl.querySelector("[data-delete-story]");
  if (deleteBtn) deleteBtn.addEventListener("click", function() {
    pauseStoryTimer();
    var thisItemId = item.id;
    state.confirmDialog = {
      title: "Apagar story?",
      text: "Essa ação não pode ser desfeita. O story será removido permanentemente.",
      confirmLabel: "Apagar",
      danger: true,
      onConfirm: function() {
        var ent = currentStoryOwnerEntry();
        if (!ent) { closeStoryViewer(); return; }
        var rmIdx = ent.items.findIndex(function(it){ return it.id === thisItemId; });
        if (rmIdx === -1) { render(); return; }
        var removed = ent.items[rmIdx];
        ent.items.splice(rmIdx, 1);
        ent.seenCount = Math.min(ent.seenCount, ent.items.length);
        if (removed._fromFs && typeof FB !== "undefined" && FB.deleteStory) {
          FB.deleteStory(removed.id).catch(function(){});
        }
        showToast("Story apagado.");
        if (ent.items.length === 0) {
          closeStoryViewer();
        } else {
          state.viewingStoryItemIdx = Math.min(rmIdx, ent.items.length - 1);
          render();
        }
      }
    };
    render();
  });

  runStoryTimer(entry, itemIdx);

  if (!isOwn) entry.seenCount = Math.max(entry.seenCount, itemIdx+1);
}

// Referência ao <video> do story em exibição (se houver), pra poder
// pausar/retomar de verdade — e não só um timer artificial desconectado
// da reprodução real.
var storyVideoEl = null;
// Preferência de som entre um vídeo de story e outro (começa mutado pra
// garantir que o autoplay funcione em qualquer navegador/celular).
var storyMuted = true;

function runStoryTimer(entry, itemIdx) {
  clearInterval(storyViewerTimer);
  storyViewerTimer = null;
  storyVideoEl = null;
  var fillEl = appEl.querySelector('[data-seg-fill="'+itemIdx+'"]');
  var item = entry.items[itemIdx];

  if (item && item.type === "video") {
    // Vídeo: a barra de progresso e o avanço pro próximo item seguem a
    // duração REAL do vídeo (evento "ended"), em vez de um tempo fixo —
    // antes isso cortava qualquer vídeo em 5s, não importa a duração real.
    var videoEl = appEl.querySelector("[data-story-media]");
    if (!videoEl) { goToNextStoryItem(); return; }
    storyVideoEl = videoEl;
    videoEl.muted = storyMuted;
    videoEl.addEventListener("timeupdate", function() {
      if (!videoEl.duration || isNaN(videoEl.duration)) return;
      var pct = Math.min(100, (videoEl.currentTime / videoEl.duration) * 100);
      if (fillEl) fillEl.style.width = pct + "%";
    });
    videoEl.addEventListener("ended", function() {
      goToNextStoryItem();
    });
    if (!state.storyPaused) videoEl.play().catch(function(){});

    var muteBtn = appEl.querySelector("[data-story-mute-toggle]");
    if (muteBtn) muteBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      storyMuted = !storyMuted;
      videoEl.muted = storyMuted;
      muteBtn.innerHTML = icoSvg(storyMuted ? "micOff" : "mic", 18, "#fff");
    });
    return;
  }

  // Imagem: continua com o avanço automático de 5s
  var elapsed = 0;
  var duration = 5000;
  storyViewerTimer = setInterval(function() {
    if (state.storyPaused) return;
    elapsed += 100;
    var pct = Math.min(100, (elapsed/duration)*100);
    if (fillEl) fillEl.style.width = pct + "%";
    if (elapsed >= duration) {
      clearInterval(storyViewerTimer);
      goToNextStoryItem();
    }
  }, 100);
}
function pauseStoryTimer() {
  state.storyPaused = true;
  if (storyVideoEl) storyVideoEl.pause();
}
function resumeStoryTimerIfNeeded() {
  state.storyPaused = false;
  if (storyVideoEl) storyVideoEl.play().catch(function(){});
}

function goToNextStoryItem() {
  var entry = currentStoryOwnerEntry();
  if (!entry) return closeStoryViewer();
  if (state.viewingStoryItemIdx < entry.items.length - 1) {
    state.viewingStoryItemIdx++;
    render();
  } else {
    // move to next owner
    var list = allStoriesList();
    if (state.viewingStoryIdx < list.length - 1) {
      state.viewingStoryIdx++;
      state.viewingStoryItemIdx = 0;
      render();
    } else {
      closeStoryViewer();
    }
  }
}
function goToPrevStoryItem() {
  if (state.viewingStoryItemIdx > 0) {
    state.viewingStoryItemIdx--;
    render();
  } else if (state.viewingStoryIdx > 0) {
    state.viewingStoryIdx--;
    var entry = currentStoryOwnerEntry();
    state.viewingStoryItemIdx = entry ? entry.items.length - 1 : 0;
    render();
  }
}

function closeStoryViewer() {
  clearInterval(storyViewerTimer);
  state.viewingStoryIdx = null;
  state.viewingStoryItemIdx = 0;
  state.storyPaused = false;
  render();
}

// ─── STORY ACTIVITY PANEL (visualizações / curtidas / respostas) ──────────
// Pra quem é dono do story, mostra 3 abas: quem viu, quem curtiu e as
// respostas. Pra quem está só assistindo o story de outra pessoa, mostra só
// as respostas (como antes).
function openStoryComments(initialTab) {
  var entry = currentStoryOwnerEntry();
  if (!entry) return;
  var itemIdx = Math.min(state.viewingStoryItemIdx, entry.items.length-1);
  var item = entry.items[itemIdx];
  var isOwn = entry.ownerId === ME_ID;
  var activeTab = isOwn ? (initialTab || "views") : "comments";

  var panel = document.createElement("div");
  panel.className = "story-comments-panel fade-in";
  panel.setAttribute("data-story-comments-panel","1");
  document.body.appendChild(panel);

  function listRow(u, rightHtml) {
    return '<div class="comment-row" style="padding:8px 16px;align-items:center;">' + avatarHtml(u.avatar,34) +
      '<div style="flex:1;margin-left:10px;font-size:13.5px;font-weight:600;">'+esc(u.name)+'</div>' + (rightHtml||"") + '</div>';
  }

  function bodyHtml() {
    if (activeTab === "views") {
      var viewers = state.storyViewsCache[item.id];
      if (viewers == null) {
        if (typeof FB !== "undefined" && FB.getStoryViewers) {
          FB.getStoryViewers(entry.ownerId, item.id).then(function(v){
            state.storyViewsCache[item.id] = v || [];
            draw();
          }).catch(function(){ state.storyViewsCache[item.id] = []; draw(); });
        }
        return '<div class="search-empty">Carregando…</div>';
      }
      if (!viewers.length) return '<div class="search-empty">Ninguém viu esse story ainda.</div>';
      return viewers.map(function(v){
        var u = USERS[v.uid] || { name:"Usuário", avatar:"" };
        return listRow(u);
      }).join("");
    }
    if (activeTab === "likes") {
      if (!item.likes.length) return '<div class="search-empty">Nenhuma curtida ainda.</div>';
      return item.likes.map(function(likeUid){
        var u = USERS[likeUid] || { name:"Usuário", avatar:"" };
        return listRow(u, icoSvg("heart",16,C.pink,true));
      }).join("");
    }
    if (!item.comments.length) return '<div class="search-empty">Nenhuma resposta ainda.</div>';
    return item.comments.map(function(c) {
      var u = USERS[c.authorId];
      return '<div class="comment-row" style="padding:0 16px;">' + avatarHtml(u.avatar,30) +
        '<div class="comment-bubble"><span class="comment-user">'+esc(u.name)+' </span>' +
        '<span class="comment-time">'+esc(c.time)+'</span><p class="comment-text">'+esc(c.text)+'</p></div></div>';
    }).join("");
  }

  function tabsHtml() {
    if (!isOwn) return "";
    var tabs = [["views","Visualizações"],["likes","Curtidas"],["comments","Respostas"]];
    return '<div style="display:flex;border-bottom:1px solid var(--border);">' +
      tabs.map(function(t){
        var on = activeTab === t[0];
        return '<button data-activity-tab="'+t[0]+'" style="flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:'+(on?"700":"500")+';color:'+(on?"var(--text)":"var(--sub)")+';border-bottom:2px solid '+(on?"var(--accent)":"transparent")+';">'+t[1]+'</button>';
      }).join("") + '</div>';
  }

  function headerLabel() {
    if (!isOwn) return "Respostas";
    return activeTab === "views" ? "Visualizações" : activeTab === "likes" ? "Curtidas" : "Respostas";
  }

  function draw() {
    panel.innerHTML =
      '<div class="story-comments-box">' +
        '<div style="padding:14px 16px;border-bottom:1px solid var(--border);text-align:center;font-weight:700;font-size:14px;position:relative;">' +
          esc(headerLabel()) +
          '<button class="icon-btn" data-close-story-comments style="position:absolute;right:10px;top:8px;color:var(--muted);">'+icoSvg("close",20)+'</button>' +
        '</div>' +
        tabsHtml() +
        '<div style="overflow:auto;padding:10px 0;flex:1;">'+bodyHtml()+'</div>' +
      '</div>';
    panel.querySelector("[data-close-story-comments]").addEventListener("click", closeStoryComments);
    panel.querySelectorAll("[data-activity-tab]").forEach(function(btn){
      btn.addEventListener("click", function(){
        activeTab = btn.getAttribute("data-activity-tab");
        draw();
      });
    });
  }

  panel.addEventListener("click", function(e) { if (e.target === panel) closeStoryComments(); });
  draw();
}
function closeStoryComments() {
  var p = document.querySelector("[data-story-comments-panel]");
  if (p) p.remove();
  resumeStoryTimerIfNeeded();
}

    '<div class="mimi-bottom-bar">' +
      '<div class="mimi-progress-wrap" data-mimi-seekbar="'+postId+'">' +
        '<div class="mimi-progress-track">' +
          '<div class="mimi-progress-fill" data-mimi-fill="'+postId+'"></div>' +

          '<svg data-mimi-playicon2="'+postId+'" width="22" height="22" viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M8 5v14l11-7z"/></svg>' +
        '</button>' +

          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>' +

function bindMimiPlayers() {
  appEl.querySelectorAll('[data-mimi-player]').forEach(function(wrap) {
    var pid = wrap.getAttribute('data-mimi-player');
    var video = wrap.querySelector('[data-mimi-video="'+pid+'"]');
    if (!video) return;

    var fill       = wrap.querySelector('[data-mimi-fill="'+pid+'"]');
    var thumb      = wrap.querySelector('[data-mimi-thumb="'+pid+'"]');
    var timeBadge  = wrap.querySelector('[data-mimi-timebadge="'+pid+'"]');
    var durLabel   = wrap.querySelector('[data-mimi-duration="'+pid+'"]');
    var playIcon   = wrap.querySelector('[data-mimi-playicon="'+pid+'"]');
    var playIcon2  = wrap.querySelector('[data-mimi-playicon2="'+pid+'"]');
    var playCenter = wrap.querySelector('[data-mimi-playcenter="'+pid+'"]');
    var muteBtn    = wrap.querySelector('[data-mimi-mute="'+pid+'"]');
    var seekBar    = wrap.querySelector('[data-mimi-seekbar="'+pid+'"]');
    var volPath    = wrap.querySelector('[data-mimi-volpath="'+pid+'"]');
    var fsBtn      = wrap.querySelector('[data-mimi-fullscreen="'+pid+'"]');

    var PLAY_PATH  = 'M8 5v14l11-7z';
    var PAUSE_PATH = 'M6 4h4v16H6zM14 4h4v16h-4z';

    function fmtTime(t) {
      if (!t || isNaN(t)) return '0:00';
      var m = Math.floor(t/60), s = Math.floor(t%60);
      return m + ':' + (s<10?'0':'')+s;
    }

    function updateIcons() {
      var p = video.paused ? PLAY_PATH : PAUSE_PATH;
      if (playIcon)  playIcon.querySelector('path') ? playIcon.querySelector('path').setAttribute('d',p) : (playIcon.innerHTML = '<path d="'+p+'"/>');
      if (playIcon2) playIcon2.querySelector('path') ? playIcon2.querySelector('path').setAttribute('d',p) : (playIcon2.innerHTML = '<path d="'+p+'"/>');
    }

    function updateProgress() {
      if (!video.duration) return;
      var pct = (video.currentTime / video.duration) * 100;
      if (fill)  fill.style.width  = pct + '%';
      if (thumb) thumb.style.left  = pct + '%';
      var cur = fmtTime(video.currentTime);
      var tot = fmtTime(video.duration);
      if (timeBadge) timeBadge.textContent = cur;
      if (durLabel)  durLabel.textContent  = cur + ' / ' + tot;
    }

    // Toggle play/pause
    function togglePlay(e) {
      if (e) e.stopPropagation();
      if (video.paused) video.play(); else video.pause();
      updateIcons();
    }

    // Hide center button when playing, show when paused
    video.addEventListener('play', function() {
      updateIcons();
      if (playCenter) playCenter.style.opacity = '0';
    });
    video.addEventListener('pause', function() {
      updateIcons();
      if (playCenter) playCenter.style.opacity = '1';
    });
    video.addEventListener('ended', function() {
      updateIcons();
      if (playCenter) playCenter.style.opacity = '1';
    });
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('loadedmetadata', updateProgress);

    // Click on center play ring
    var playBtn = wrap.querySelector('[data-mimi-playbtn="'+pid+'"]');
    if (playBtn) playBtn.addEventListener('click', togglePlay);
    var playBtn2 = wrap.querySelector('[data-mimi-playbtn2="'+pid+'"]');
    if (playBtn2) playBtn2.addEventListener('click', togglePlay);

    // Tap on video to toggle
    video.addEventListener('click', togglePlay);

    // Seek
    if (seekBar) {
      seekBar.addEventListener('click', function(e) {
        var rect = seekBar.getBoundingClientRect();
        var track = seekBar.querySelector('.mimi-progress-track');
        var trackRect = track.getBoundingClientRect();
        var ratio = (e.clientX - trackRect.left) / trackRect.width;
        ratio = Math.max(0, Math.min(1, ratio));
        if (video.duration) video.currentTime = ratio * video.duration;
      });
    }

    // Mute
    if (muteBtn) muteBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      video.muted = !video.muted;
      if (volPath) volPath.style.display = video.muted ? 'none' : '';
    });

    // Fullscreen
    if (fsBtn) fsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (video.requestFullscreen) video.requestFullscreen();
      else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    });
  });
}

function renderPostCard(post, opts) {
  opts = opts || {};
  var author = USERS[post.authorId] || { name: "Usuário", username: "@usuario", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + post.authorId, verified: false };
  var mediaHtml = "";
  if (post.video) mediaHtml = renderMimiPlayer(post.video, post.id);
  else if (post.audio) mediaHtml = '<div style="padding:10px 14px;"><audio controls src="'+post.audio+'" style="width:100%;height:36px;"></audio></div>';
  else if (post.img) mediaHtml = '<img class="post-img" src="'+post.img+'" alt="" data-open-post-media="'+post.id+'">';

  var locHtml = post.loc ? '<div class="post-loc">'+icoSvg("loc",13,C.accent)+' '+esc(post.loc)+'</div>' : "";
  var liked = postIsLiked(post);
  var commentCount = getComments(post.id).length;

  return '<div class="post-card" data-post-id="'+post.id+'">' +
    '<div class="post-head">' +
      '<div data-open-author="'+post.authorId+'" style="cursor:pointer;">'+avatarHtml(author.avatar, 42)+'</div>' +
      '<div class="grow" data-open-author="'+post.authorId+'" style="cursor:pointer;">' +
        '<div class="row" style="gap:4px;">' +
          '<span class="post-name">'+esc(author.name)+'</span>' +
          (author.verified ? userVerifiedBadge(author) : "") +
        '</div>' +
        '<div class="post-meta">' +
          '<span class="post-sub">'+esc(author.username)+'</span>' +
          '<span class="post-sub">·</span>' +
          '<span class="post-sub">'+esc(post.time)+'</span>' +
        '</div>' +
      '</div>' +
      '<button class="icon-btn" data-open-sheet="'+post.id+'" style="color:var(--muted);">'+icoSvg("more",20)+'</button>' +
    '</div>' +
    '<p class="post-text" '+(opts.noOpenText?"":'data-open-post="'+post.id+'" style="cursor:pointer;"')+'>'+esc(post.text)+'</p>' +
    locHtml +
    mediaHtml +
    '<div class="post-actions">' +
      '<button class="act-btn '+(liked?"liked":"")+'" data-like="'+post.id+'">'+icoSvg("heart",20,liked?C.pink:"var(--sub)",liked)+' <span data-like-count="'+post.id+'">'+fmtNum(postLikeCount(post))+'</span></button>' +
      '<button class="act-btn" data-toggle-comments="'+post.id+'">'+icoSvg("comment",20,"var(--sub)")+' '+fmtNum(commentCount)+'</button>' +
      '<button class="act-btn" data-share-post="'+post.id+'">'+icoSvg("share",20,"var(--sub)")+' '+fmtNum(postShareCount(post))+'</button>' +
      '<div style="margin-left:auto;">' +
        '<button class="act-btn '+(post.saved?"saved":"")+'" data-save="'+post.id+'">'+icoSvg("save",20,post.saved?C.accent:"var(--sub)",post.saved)+'</button>' +
      '</div>' +
    '</div>' +
    '<div class="comments-box '+(opts.commentsOpen?"":"hidden")+'" data-comments-box="'+post.id+'">' +
      renderCommentsList(post.id) +
      renderCommentInputRow(post.id) +
    '</div>' +
  '</div>';
}

function renderCommentInputRow(pid) {
  var replying = state.replyTarget && state.replyTarget.pid === pid ? state.replyTarget : null;
  var replyBanner = replying
    ? '<div style="display:flex;align-items:center;gap:6px;padding:4px 0 8px 38px;font-size:12px;color:var(--accent);">' +
        'Respondendo a '+esc(replying.authorName)+
        '<button data-cancel-reply style="background:none;border:none;color:var(--accent);cursor:pointer;display:flex;padding:0;">'+icoSvg("close",13)+'</button>' +
      '</div>'
    : "";
  return replyBanner +
    '<div class="comment-input-row">' +
      avatarHtml(ME.avatar, 30) +
      '<div class="row grow" style="gap:6px;">' +
        '<input class="comment-input" placeholder="'+(replying?"Responder…":"Comentar…")+'" data-comment-input="'+pid+'">' +
        '<button class="comment-send" data-add-comment="'+pid+'">'+icoSvg("send",16,"#fff")+'</button>' +
      '</div>' +
    '</div>';
}

function renderCommentsList(pid) {
  var cmts = getComments(pid);
  var topLevel = cmts.filter(function(c){ return !c.parentId; });
  var html = '<div data-comments-list="'+pid+'">';
  topLevel.forEach(function(c) { html += renderCommentItem(pid, c, cmts); });
  if (!topLevel.length) html += '<div class="search-empty" style="padding:20px 0;">Seja o primeiro a comentar! 🎀</div>';
  html += '</div>';
  return html;
}

function renderCommentItem(pid, c, allCmts) {
  var u = USERS[c.authorId];
  var liked = commentIsLiked(c);
  var replies = allCmts.filter(function(r){ return r.parentId === c.id; });
  var html = '<div class="comment-row" data-comment-id="'+c.id+'">' +
    '<div data-open-author="'+c.authorId+'" style="cursor:pointer;">'+avatarHtml(u.avatar, 30)+'</div>' +
    '<div class="comment-bubble">' +
      '<div data-open-author="'+c.authorId+'" style="cursor:pointer;display:inline;"><span class="comment-user">'+esc(u.name)+' </span></div>' +
      '<span class="comment-time">'+esc(c.time)+'</span>' +
      '<p class="comment-text">'+esc(c.text)+'</p>' +
      '<div style="display:flex;gap:14px;margin-top:4px;">' +
        '<button data-like-comment="'+pid+':'+c.id+'" style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;color:'+(liked?C.pink:"var(--muted)")+';font-size:11.5px;font-weight:700;">'+icoSvg("heart",13,liked?C.pink:"var(--muted)",liked)+' '+commentLikeCount(c)+'</button>' +
        '<button data-reply-comment="'+pid+':'+c.id+'" style="background:none;border:none;cursor:pointer;padding:0;color:var(--muted);font-size:11.5px;font-weight:700;">Responder</button>' +
        '<button data-report-comment="'+pid+':'+c.id+'" style="background:none;border:none;cursor:pointer;padding:0;color:var(--muted);font-size:11.5px;font-weight:700;">Reportar</button>' +
      '</div>' +
    '</div>' +
  '</div>';
  if (replies.length) {
    html += '<div style="margin-left:38px;">';
    replies.forEach(function(r) { html += renderCommentItem(pid, r, allCmts); });
    html += '</div>';
  }
  return html;
}

  appEl.querySelectorAll("[data-open-post], [data-open-post-media]").forEach(function(el) {
    el.addEventListener("click", function(e) {

    });

  appEl.querySelectorAll("[data-open-sheet]").forEach(function(btn) {
